        - gameplay
      properties:
        type:
          type: string
          enum:
            - GAMEPLAY_UPDATE
        toUser:
          type: string
          format: uuid
        gameplay:
          $ref: "#/components/schemas/GameplaySnapshot"
    GameStartedMessage:
      type: object
