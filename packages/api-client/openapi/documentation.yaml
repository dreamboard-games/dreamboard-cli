        version:
          type: integer
          description: Auto-incremented version number for this game
        gameId:
          type: string
          format: uuid
          description: Game identifier
      required:
        - ruleId
        - version
        - gameId
    GameRule:
      type: object
      properties:
        ruleId:
          type: string
          format: uuid
          description: Unique identifier for this rule version
        gameId:
          type: string
          format: uuid
          description: Game identifier
        userId:
          type: string
          format: uuid
          description: User who created this version
        ruleText:
          type: string
          description: The game rules text content
        version:
          type: integer
          description: Version number for this game's rules
        createdAt:
          type: string
          format: date-time
          description: When this version was created
      required:
        - ruleId
        - gameId
        - userId
        - ruleText
        - version
        - createdAt
    CreateSessionRequest:
      type: object
      properties:
        compiledResultId:
          type: string
          format: uuid
          description: Compiled result ID to use for game logic and UI. If omitted, the latest successful compiled result is used.
        seed:
          type: integer
          format: int64
          description: Optional deterministic RNG seed used when starting gameplay for this session.
        playerCount:
          type: integer
          description: Number of players to create seats for (defaults to manifest minPlayers)
        autoAssignSeats:
          type: boolean
          description: If true, assign all seats to the host user (skips lobby seat assignment)
    CreateSessionResponse:
      type: object
      properties:
        sessionId:
          type: string
          format: uuid
          description: Unique identifier for the created session
        shortCode:
          type: string
          description: Memorable short code for sharing (e.g., 'swift-falcon-73')
        gameId:
          type: string
          format: uuid
          description: Game identifier
        hostUserId:
          type: string
          format: uuid
          description: User ID of the session host
      required:
        - sessionId
        - shortCode
        - gameId
        - hostUserId
    SeatAssignment:
      type: object
      properties:
        playerId:
          type: string
          description: Player identifier (e.g., 'player-1')
        controllerUserId:
          type: string
          format: uuid
          description: User ID assigned to this seat (null if empty)
          nullable: true
        displayName:
          type: string
          description: Display name for this seat/player
        playerColor:
          type: string
          description: Hex color code for the player (e.g., '#FF5733')
        isHost:
          type: boolean
          description: Whether this seat is the host
          default: false
      required:
        - playerId
        - displayName
    SessionStatus:
      type: object
      description: Complete session status including all fields needed by the frontend. Player IDs are provided via GAME_STARTED SSE message.
      properties:
        sessionId:
          type: string
          format: uuid
          description: Unique identifier for the session
        shortCode:
          type: string
          description: Memorable short code for sharing (e.g., 'swift-falcon-73')
        gameId:
          type: string
          format: uuid
          description: Unique identifier for the game definition
        hostUserId:
          type: string
          format: uuid
          description: User ID of the session host
        status:
          type: string
          enum:
            - active
            - ended
          description: Overall session status
        phase:
          type: string
          enum:
            - lobby
            - gameplay
            - ended
          description: Current phase of the session
        seats:
          type: array
          items:
            $ref: "#/components/schemas/SeatAssignment"
          description: Current seat assignments (populated in lobby phase)
        canStart:
          type: boolean
          description: Whether the game can be started (all required seats filled)
      required:
        - sessionId
        - shortCode
        - gameId
        - hostUserId
        - status
        - phase
        - seats
        - canStart
    CardInfo:
      type: object
      description: Card information including type and properties
      required:
        - cardType
        - cardSetId
        - properties
      properties:
        cardType:
          type: string
          description: Card type identifier matching a card set in the manifest
        cardSetId:
          type: string
          description: The card set ID this card was created from (e.g., 'standard_52_deck')
        cardName:
          type: string
          nullable: true
          description: Display name for the card
        description:
          type: string
          nullable: true
          description: Optional rules text or description
        properties:
          type: string
          description: JSON-serialized custom properties specific to this game's cards as defined by the game's BoardManifest card set schemas
    SimpleHexTileState:
      type: object
      description: State of a hex tile on a hex board
      required:
        - id
        - q
        - r
      properties:
        id:
          type: string
          description: Unique tile identifier
        q:
          type: integer
          description: Axial coordinate Q
        r:
          type: integer
          description: Axial coordinate R
        typeId:
          type: string
          nullable: true
          description: Tile type identifier for rendering
        label:
          type: string
          nullable: true
          description: Display label on the tile
        owner:
          type: string
          nullable: true
          description: Player ID who owns this tile
        properties:
          type: string
          nullable: true
          description: JSON-serialized custom properties
    SimpleHexEdgeState:
      type: object
      description: State of an edge between two hex tiles (e.g., roads in Catan)
      required:
        - id
        - hex1
        - hex2
      properties:
        id:
          type: string
          description: Unique edge identifier
        hex1:
          type: string
          description: First hex tile ID this edge borders
        hex2:
          type: string
          description: Second hex tile ID this edge borders
        typeId:
          type: string
          nullable: true
          description: Edge type identifier for rendering
        owner:
          type: string
          nullable: true
          description: Player ID who owns this edge
        properties:
          type: string
          nullable: true
          description: JSON-serialized custom properties
    SimpleHexVertexState:
      type: object
      description: State of a vertex where three hex tiles meet (e.g., settlements in Catan)
      required:
        - id
        - hexes
      properties:
        id:
          type: string
          description: Unique vertex identifier
        hexes:
          type: array
          items:
            type: string
          minItems: 3
          maxItems: 3
          description: The three hex tile IDs this vertex touches
        typeId:
          type: string
          nullable: true
          description: Vertex type identifier for rendering
        owner:
          type: string
          nullable: true
          description: Player ID who owns this vertex
        properties:
          type: string
          nullable: true
          description: JSON-serialized custom properties
    SimpleHexBoardState:
      type: object
      description: Complete state of a hex board
      required:
        - id
        - tiles
        - edges
        - vertices
      properties:
        id:
          type: string
          description: Unique board identifier
        tiles:
          type: array
          items:
            $ref: "#/components/schemas/SimpleHexTileState"
          description: All tiles on the board
        edges:
          type: array
          items:
            $ref: "#/components/schemas/SimpleHexEdgeState"
          description: All edges on the board
        vertices:
          type: array
          items:
            $ref: "#/components/schemas/SimpleHexVertexState"
          description: All vertices on the board
    SimpleNetworkNodeState:
      type: object
      description: State of a node in a network graph board
      required:
        - id
        - x
        - "y"
      properties:
        id:
          type: string
          description: Unique node identifier
        x:
          type: number
          description: X coordinate position
        "y":
          type: number
          description: Y coordinate position
        typeId:
          type: string
          nullable: true
          description: Node type identifier for rendering
        label:
          type: string
          nullable: true
          description: Display label on the node
        owner:
          type: string
          nullable: true
          description: Player ID who owns this node
        properties:
          type: string
          nullable: true
          description: JSON-serialized custom properties
    SimpleNetworkEdgeState:
      type: object
      description: State of an edge connecting two nodes in a network graph
      required:
        - id
        - from
        - to
      properties:
        id:
          type: string
          description: Unique edge identifier
        from:
          type: string
          description: Source node ID
        to:
          type: string
          description: Target node ID
        typeId:
          type: string
          nullable: true
          description: Edge type identifier for rendering
        label:
          type: string
          nullable: true
          description: Display label on the edge
        owner:
          type: string
          nullable: true
          description: Player ID who owns this edge
        properties:
          type: string
          nullable: true
          description: JSON-serialized custom properties
    SimpleNetworkPieceState:
      type: object
      description: State of a piece placed on a network node
      required:
        - id
        - nodeId
      properties:
        id:
          type: string
          description: Unique piece identifier
        nodeId:
          type: string
          description: ID of the node this piece is on
        typeId:
          type: string
          nullable: true
          description: Piece type identifier for rendering
        owner:
          type: string
          nullable: true
          description: Player ID who owns this piece
        properties:
          type: string
          nullable: true
          description: JSON-serialized custom properties
    SimpleNetworkBoardState:
      type: object
      description: Complete state of a network graph board
      required:
        - id
        - nodes
        - edges
        - pieces
      properties:
        id:
          type: string
          description: Unique board identifier
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/SimpleNetworkNodeState"
          description: All nodes on the board
        edges:
          type: array
          items:
            $ref: "#/components/schemas/SimpleNetworkEdgeState"
          description: All edges on the board
        pieces:
          type: array
          items:
            $ref: "#/components/schemas/SimpleNetworkPieceState"
          description: All pieces on the board
    SimpleSquareCellState:
      type: object
      description: State of a cell on a square grid board
      required:
        - row
        - col
      properties:
        row:
          type: integer
          description: Row index (0-based)
        col:
          type: integer
          description: Column index (0-based)
        typeId:
          type: string
          nullable: true
          description: Cell type identifier for rendering
        owner:
          type: string
          nullable: true
          description: Player ID who owns this cell
        properties:
          type: string
          nullable: true
          description: JSON-serialized custom properties
    SimpleSquarePieceState:
      type: object
      description: State of a piece on a square grid board
      required:
        - id
        - row
        - col
        - typeId
      properties:
        id:
          type: string
          description: Unique piece identifier
        row:
          type: integer
          description: Row index where piece is located
        col:
          type: integer
          description: Column index where piece is located
        typeId:
          type: string
          description: Piece type identifier for rendering
        owner:
          type: string
          nullable: true
          description: Player ID who owns this piece
        properties:
          type: string
          nullable: true
          description: JSON-serialized custom properties
    SimpleSquareBoardState:
      type: object
      description: Complete state of a square grid board
      required:
        - id
        - rows
        - cols
        - cells
        - pieces
      properties:
        id:
          type: string
          description: Unique board identifier
        rows:
          type: integer
          description: Number of rows in the grid
        cols:
          type: integer
          description: Number of columns in the grid
        cells:
          type: array
          items:
            $ref: "#/components/schemas/SimpleSquareCellState"
          description: All cells with non-default state
        pieces:
          type: array
          items:
            $ref: "#/components/schemas/SimpleSquarePieceState"
          description: All pieces on the board
    SimpleTrackSpaceState:
      type: object
      description: State of a space on a track board (e.g., Monopoly board spaces)
      required:
        - id
        - index
        - x
        - "y"
      properties:
        id:
          type: string
          description: Unique space identifier
        index:
          type: integer
          description: Position index in the track sequence
        x:
          type: number
          description: X coordinate for rendering
        "y":
          type: number
          description: Y coordinate for rendering
        name:
          type: string
          nullable: true
          description: Display name of the space
        typeId:
          type: string
          nullable: true
          description: Space type identifier for rendering
        owner:
          type: string
          nullable: true
          description: Player ID who owns this space
        nextSpaces:
          type: array
          items:
            type: string
          nullable: true
          description: IDs of spaces that can be reached from here (for branching tracks)
        properties:
          type: string
          nullable: true
          description: JSON-serialized custom properties
    SimpleTrackPieceState:
      type: object
      description: State of a piece on a track board
      required:
        - id
        - spaceId
        - owner
      properties:
        id:
          type: string
          description: Unique piece identifier
        spaceId:
          type: string
          description: ID of the space this piece occupies
        owner:
          type: string
          description: Player ID who owns this piece
        typeId:
          type: string
          nullable: true
          description: Piece type identifier for rendering
        properties:
          type: string
          nullable: true
          description: JSON-serialized custom properties
    SimpleTrackBoardState:
      type: object
      description: Complete state of a track board
      required:
        - id
        - spaces
        - pieces
      properties:
        id:
          type: string
          description: Unique board identifier
        spaces:
          type: array
          items:
            $ref: "#/components/schemas/SimpleTrackSpaceState"
          description: All spaces on the track
        pieces:
          type: array
          items:
            $ref: "#/components/schemas/SimpleTrackPieceState"
          description: All pieces on the board
    SimpleBoardStates:
      type: object
      description: Container for all board states organized by type
      required:
        - hex
        - network
        - square
        - track
      properties:
        hex:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SimpleHexBoardState"
          description: Map of board IDs to hex board states (e.g., Catan, Hive)
        network:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SimpleNetworkBoardState"
          description: Map of board IDs to network board states (e.g., Ticket to Ride)
        square:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SimpleSquareBoardState"
          description: Map of board IDs to square grid board states (e.g., Chess, Go)
        track:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SimpleTrackBoardState"
          description: Map of board IDs to track board states (e.g., Monopoly)
    SimpleDieState:
      type: object
      description: State of a die component
      required:
        - id
        - sides
      properties:
        id:
          type: string
          description: Unique die identifier
        sides:
          type: integer
          description: Number of sides on the die (e.g., 6 for standard die)
        currentValue:
          type: integer
          nullable: true
          description: Current face value (1 to sides, null if not rolled)
        color:
          type: string
          nullable: true
          description: Optional color for visual identification
    SimpleGameState:
      type: object
      description: Simplified game state for API responses
      required:
        - currentPlayerIds
        - decks
        - hands
        - publicHands
        - cards
        - globalVariables
        - playerVariables
        - currentState
        - isMyTurn
        - boards
        - dice
      properties:
        currentPlayerIds:
          type: array
          items:
            type: string
          description: IDs of all currently active players (supports MULTIPLE_ACTIVE_PLAYER states)
        decks:
          type: object
          additionalProperties:
            type: array
            minItems: 0
            items:
              type: string
          description: Map of deck IDs to array of card IDs (arrays are always present, never null)
        hands:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: array
              minItems: 0
              items:
                type: string
          description: Nested map of playerId -> handId -> card IDs. Frontend extracts only the controlling player's hands.
        publicHands:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: array
              minItems: 0
              items:
                type: string
          description: Public hands grouped by hand ID then player ID.
        cards:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/CardInfo"
          description: Map of card IDs to their card info including type and properties
        globalVariables:
          type: string
          description: JSON-serialized global game variables as defined in manifest variableSchema.globalVariableSchema
        playerVariables:
          type: string
          description: JSON-serialized map of player IDs to their variables as defined in manifest variableSchema.playerVariableSchema
        playerResources:
          type: string
          description: JSON-serialized map of player IDs to their resource amounts (resourceId -> amount)
          nullable: true
        currentState:
          type: string
          description: Current state in the game's state machine
        isMyTurn:
          type: boolean
          description: Whether it is the current user's turn
        uiArgs:
          type: object
          additionalProperties:
            type: string
            nullable: true
          description: Map of player ID to JSON-serialized UI arguments for each controlled player
        boards:
          $ref: "#/components/schemas/SimpleBoardStates"
          description: Container for all board states organized by type
        dice:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SimpleDieState"
          description: Map of die IDs to their current state
    GameStartedMessage:
      type: object
      required:
        - type
        - toUser
        - gameState
        - activePlayers
        - controllablePlayerIds
      properties:
        type:
          type: string
          enum:
            - GAME_STARTED
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to
        gameState:
          $ref: "#/components/schemas/SimpleGameState"
        activePlayers:
          type: array
          items:
            type: string
          description: Player IDs of currently active players
        controllablePlayerIds:
          type: array
          items:
            type: string
          description: Player IDs that this user can control in this session
    YourTurnMessage:
      type: object
      required:
        - type
        - toUser
        - availableActions
        - gameState
        - activePlayers
      properties:
        type:
          type: string
          enum:
            - YOUR_TURN
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to
        availableActions:
          type: array
          items:
            $ref: "#/components/schemas/ActionDefinition"
          description: List of action definitions available to the player
        gameState:
          $ref: "#/components/schemas/SimpleGameState"
        activePlayers:
          type: array
          items:
            type: string
          description: Player IDs whose turn it is
    GameAction:
      type: object
      description: Represents a player action with type and parameters
      required:
        - actionType
        - parameters
      properties:
        actionType:
          type: string
          description: Action type identifier from manifest availableActions
        parameters:
          type: string
          description: JSON-serialized parameters specific to this action
    ActionExecutedMessage:
      type: object
      required:
        - type
        - toUser
        - playerId
        - action
        - newState
      properties:
        type:
          type: string
          enum:
            - ACTION_EXECUTED
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to
        playerId:
          type: string
          description: Player ID who executed the action
        action:
          $ref: "#/components/schemas/GameAction"
        newState:
          $ref: "#/components/schemas/SimpleGameState"
    ActionRejectedMessage:
      type: object
      required:
        - type
        - toUser
        - reason
      properties:
        type:
          type: string
          enum:
            - ACTION_REJECTED
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to
        reason:
          type: string
          description: Reason why the action was rejected
        errorCode:
          type: string
          nullable: true
          description: Machine-readable error code from game logic validation
        targetPlayer:
          type: string
          nullable: true
          description: Player ID whose action was rejected
    TurnChangedMessage:
      type: object
      required:
        - type
        - toUser
        - previousPlayers
        - currentPlayers
      properties:
        type:
          type: string
          enum:
            - TURN_CHANGED
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to
        previousPlayers:
          type: array
          items:
            type: string
          description: Player IDs of the previous active players
        currentPlayers:
          type: array
          items:
            type: string
          description: Player IDs of the current active players
    GameEndedMessage:
      type: object
      required:
        - type
        - toUser
        - finalScores
        - reason
      properties:
        type:
          type: string
          enum:
            - GAME_ENDED
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to
        winner:
          type: string
          nullable: true
          description: Player ID of the winner (if any)
        finalScores:
          type: object
          additionalProperties:
            type: integer
          description: Map of player IDs to their final scores
        reason:
          type: string
          description: Reason for game ending
    StateUpdateMessage:
      type: object
      required:
        - type
        - toUser
        - gameState
        - phase
      properties:
        type:
          type: string
          enum:
            - STATE_UPDATE
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to
        gameState:
          $ref: "#/components/schemas/SimpleGameState"
        phase:
          type: string
          description: Current game phase
    StateChangedMessage:
      type: object
      required:
        - type
        - toUser
        - newState
      properties:
        type:
          type: string
          enum:
            - STATE_CHANGED
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to
        newState:
          type: string
          description: Name of the new state
    AvailableActionsMessage:
      type: object
      required:
        - type
        - toUser
        - playerId
        - actions
      properties:
        type:
          type: string
          enum:
            - AVAILABLE_ACTIONS
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to
        playerId:
          type: string
          description: Player ID for whom actions are available
        actions:
          type: array
          items:
            $ref: "#/components/schemas/GameAction"
          description: List of available game actions
    ErrorMessage:
      type: object
      required:
        - type
        - toUser
        - message
      properties:
        type:
          type: string
          enum:
            - ERROR
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to
        message:
          type: string
          description: Error message
        code:
          type: string
          nullable: true
          description: Error code
    LobbyUpdateMessage:
      type: object
      required:
        - type
        - toUser
        - seats
        - canStart
        - hostUserId
      properties:
        type:
          type: string
          enum:
            - LOBBY_UPDATE
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to
        seats:
          type: array
          items:
            $ref: "#/components/schemas/SeatAssignment"
          description: Current seat assignments in the lobby
        canStart:
          type: boolean
          description: Whether the game can be started
        hostUserId:
          type: string
          description: User ID of the session host
    HistoryEntrySummary:
      type: object
      description: Summary of a game state history entry
      required:
        - id
        - version
        - timestamp
        - description
        - isCurrent
      properties:
        id:
          type: string
          description: Unique identifier for this history entry
        version:
          type: integer
          description: Event store version number
        timestamp:
          type: string
          format: date-time
          description: When this snapshot was created
        description:
          type: string
          description: Human-readable description of the action
        playerId:
          type: string
          nullable: true
          description: Player who performed the action
        actionType:
          type: string
          nullable: true
          description: Type of action that triggered this snapshot
        isCurrent:
          type: boolean
          description: Whether this is the current game state
    HistoryUpdatedMessage:
      type: object
      description: Sent to host when history entries change
      required:
        - type
        - toUser
        - entries
        - currentIndex
        - canGoBack
        - canGoForward
      properties:
        type:
          type: string
          enum:
            - HISTORY_UPDATED
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to (host only)
        entries:
          type: array
          items:
            $ref: "#/components/schemas/HistoryEntrySummary"
          description: List of history entries
        currentIndex:
          type: integer
          description: Index of the current state in the history
        canGoBack:
          type: boolean
          description: Whether there are earlier states to restore to
        canGoForward:
          type: boolean
          description: Whether there are later states to restore to
    HistoryRestoredMessage:
      type: object
      description: Sent to all users when game state is restored from history
      required:
        - type
        - toUser
        - restoredToVersion
        - gameState
      properties:
        type:
          type: string
          enum:
            - HISTORY_RESTORED
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to
        restoredToVersion:
          type: integer
          description: The version number that was restored to
        gameState:
          $ref: "#/components/schemas/SimpleGameState"
          description: The restored game state
        description:
          type: string
          nullable: true
          description: Description of the restored point
    GameMessage:
      oneOf:
        - $ref: "#/components/schemas/GameStartedMessage"
        - $ref: "#/components/schemas/YourTurnMessage"
        - $ref: "#/components/schemas/ActionExecutedMessage"
        - $ref: "#/components/schemas/ActionRejectedMessage"
        - $ref: "#/components/schemas/TurnChangedMessage"
        - $ref: "#/components/schemas/GameEndedMessage"
        - $ref: "#/components/schemas/StateUpdateMessage"
        - $ref: "#/components/schemas/StateChangedMessage"
        - $ref: "#/components/schemas/AvailableActionsMessage"
        - $ref: "#/components/schemas/ErrorMessage"
        - $ref: "#/components/schemas/LobbyUpdateMessage"
        - $ref: "#/components/schemas/HistoryUpdatedMessage"
        - $ref: "#/components/schemas/HistoryRestoredMessage"
      discriminator:
        propertyName: type
        mapping:
          GAME_STARTED: "#/components/schemas/GameStartedMessage"
          YOUR_TURN: "#/components/schemas/YourTurnMessage"
          ACTION_EXECUTED: "#/components/schemas/ActionExecutedMessage"
          ACTION_REJECTED: "#/components/schemas/ActionRejectedMessage"
          TURN_CHANGED: "#/components/schemas/TurnChangedMessage"
          GAME_ENDED: "#/components/schemas/GameEndedMessage"
          STATE_UPDATE: "#/components/schemas/StateUpdateMessage"
          STATE_CHANGED: "#/components/schemas/StateChangedMessage"
          AVAILABLE_ACTIONS: "#/components/schemas/AvailableActionsMessage"
          ERROR: "#/components/schemas/ErrorMessage"
          LOBBY_UPDATE: "#/components/schemas/LobbyUpdateMessage"
          HISTORY_UPDATED: "#/components/schemas/HistoryUpdatedMessage"
          HISTORY_RESTORED: "#/components/schemas/HistoryRestoredMessage"
    LogMessageDto:
      type: object
      description: Log entry from the game engine console output
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the log entry
        type:
          type: string
          description: Type of log entry (e.g., STDOUT, STDERR)
        message:
          type: string
          description: The log message content
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the log was recorded
      required:
        - id
        - type
        - message
        - timestamp
    StartGameResponse:
      type: object
      description: Response containing gameplay session data after starting the game. Player IDs are sent via GAME_STARTED SSE message.
      properties:
        sessionId:
          type: string
          format: uuid
          description: Unique identifier for the game session
        gameId:
          type: string
          format: uuid
          description: Unique identifier for the game
        shortCode:
          type: string
          description: Memorable short code for the session (e.g., 'swift-falcon-73'). Can be used to construct the play URL.
      required:
        - sessionId
        - gameId
        - shortCode
    SubmitActionRequest:
      type: object
      properties:
        playerId:
          type: string
          description: Player identifier submitting the action
        actionType:
          type: string
          description: Type of action being performed
        parameters:
          type: string
          description: JSON-serialized action parameters
      required:
        - playerId
        - actionType
        - parameters
    SubmitActionResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Whether the action was successfully submitted
      required:
        - success
    ValidateActionRequest:
      type: object
      description: Request to validate a player action before submitting
      properties:
        playerId:
          type: string
          description: Player identifier submitting the action
        actionType:
          type: string
          description: Type of action being validated
        parameters:
          type: string
          description: JSON-serialized action parameters
      required:
        - playerId
        - actionType
        - parameters
    ValidateActionResponse:
      type: object
      description: Result of action validation
      properties:
        valid:
          type: boolean
          description: Whether the action is valid
        errorCode:
          type: string
          nullable: true
          description: Machine-readable error code if validation failed
        message:
          type: string
          nullable: true
          description: Human-readable error message if validation failed
      required:
        - valid
    UpdateSeatRequest:
      type: object
      description: Request to update seat settings (display name and/or player color)
      properties:
        displayName:
          type: string
          description: New display name for the player
          minLength: 1
          maxLength: 30
        playerColor:
          type: string
          description: Hex color code for the player (e.g., '#FF5733')
          pattern: ^#[0-9A-Fa-f]{6}$
    RestoreHistoryRequest:
      type: object
      description: Request to restore game state to a previous history point
      required:
        - entryId
      properties:
        entryId:
          type: string
          description: ID of the history entry to restore to
    RestoreHistoryResponse:
      type: object
      description: Response after restoring game state from history
      required:
        - success
        - restoredToVersion
      properties:
        success:
          type: boolean
          description: Whether the restore operation succeeded
        restoredToVersion:
          type: integer
          description: The version number that was restored to
        message:
          type: string
          nullable: true
          description: Optional message about the restore operation
    UserMessageEvent:
      type: object
      description: Event representing a user's message in the conversation
      required:
        - type
        - messageId
        - content
      properties:
        type:
          type: string
          enum:
            - userMessage
        messageId:
          type: string
          description: Unique identifier for this message
        content:
          type: string
          description: The user's message content
        createdAt:
          type: string
          format: date-time
          description: When the message was created
    ReasoningProgress:
      type: object
      description: Progress update containing the LLM's reasoning/thinking content
      required:
        - type
        - reason
        - messageId
      properties:
        type:
          type: string
          enum:
            - reasoning
        reason:
          type: string
          description: Incremental reasoning/thinking text to append to the current message
        delta:
          type: string
          description: Incremental text change (the new text since the last event for this part)
          nullable: true
        messageId:
          type: string
          description: Unique identifier for this message section (stable across streaming updates)
        agentName:
          type: string
          description: Name of the agent emitting this event
          nullable: true
    ToolCallPendingState:
      type: object
      description: Tool call is queued but not yet executing
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - pending
        input:
          type: string
          description: JSON-serialized input parameters
          nullable: true
    ToolCallRunningState:
      type: object
      description: Tool call is currently executing
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - running
        input:
          type: string
          description: JSON-serialized input parameters
          nullable: true
        title:
          type: string
          description: Human-readable title of the operation
          nullable: true
        metadata:
          type: string
          description: JSON-serialized metadata map
          nullable: true
    ToolCallCompletedState:
      type: object
      description: Tool call finished successfully
      required:
        - status
        - output
        - title
      properties:
        status:
          type: string
          enum:
            - completed
        input:
          type: string
          description: JSON-serialized input parameters
          nullable: true
        output:
          type: string
          description: Output/result returned by the tool
        title:
          type: string
          description: Human-readable title of the operation
        durationMs:
          type: number
          description: Execution duration in milliseconds
          nullable: true
        metadata:
          type: string
          description: JSON-serialized metadata map
          nullable: true
    ToolCallErrorState:
      type: object
      description: Tool call failed with an error
      required:
        - status
        - error
      properties:
        status:
          type: string
          enum:
            - error
        input:
          type: string
          description: JSON-serialized input parameters
          nullable: true
        error:
          type: string
          description: Error message from the tool
        durationMs:
          type: number
          description: Execution duration in milliseconds
          nullable: true
        metadata:
          type: string
          description: JSON-serialized metadata map
          nullable: true
    ToolCallState:
      oneOf:
        - $ref: "#/components/schemas/ToolCallPendingState"
        - $ref: "#/components/schemas/ToolCallRunningState"
        - $ref: "#/components/schemas/ToolCallCompletedState"
        - $ref: "#/components/schemas/ToolCallErrorState"
      discriminator:
        propertyName: status
        mapping:
          pending: "#/components/schemas/ToolCallPendingState"
          running: "#/components/schemas/ToolCallRunningState"
          completed: "#/components/schemas/ToolCallCompletedState"
          error: "#/components/schemas/ToolCallErrorState"
    ToolCallProgress:
      type: object
      description: Progress update for a tool call with full lifecycle tracking
      required:
        - type
        - toolName
        - messageId
      properties:
        type:
          type: string
          enum:
            - toolCall
        toolName:
          type: string
          description: Name of the tool being called
        toolCallId:
          type: string
          description: Unique identifier for this specific tool call invocation
          nullable: true
        state:
          $ref: "#/components/schemas/ToolCallState"
          nullable: true
        messageId:
          type: string
          description: Unique identifier for this message section
        agentName:
          type: string
          description: Name of the agent emitting this event
          nullable: true
    UtteranceProgress:
      type: object
      description: Progress update containing the LLM's conversational response
      required:
        - type
        - utterance
        - messageId
      properties:
        type:
          type: string
          enum:
            - utterance
        utterance:
          type: string
          description: Incremental conversational response text to append to the current message
        delta:
          type: string
          description: Incremental text change (the new text since the last event for this part)
          nullable: true
        messageId:
          type: string
          description: Unique identifier for this message section (stable across streaming updates)
        agentName:
          type: string
          description: Name of the agent emitting this event
          nullable: true
    ErrorProgress:
      type: object
      description: Error event emitted when an agent encounters an error
      required:
        - type
        - message
        - messageId
      properties:
        type:
          type: string
          enum:
            - error
        message:
          type: string
          description: Human-readable error message
        errorType:
          type: string
          description: Specific error type classification (e.g., 'ProviderAuthError', 'APIError', 'MessageAbortedError')
          nullable: true
        details:
          type: array
          items:
            type: string
          description: Additional error details
          nullable: true
        messageId:
          type: string
          description: Unique identifier for this message section
        agentName:
          type: string
          description: Name of the agent emitting this event
          nullable: true
    ToolExecutionErrorProgress:
      type: object
      description: Error event emitted when a tool execution fails
      required:
        - type
        - toolName
        - errorMessage
        - messageId
      properties:
        type:
          type: string
          enum:
            - toolExecutionError
        toolName:
          type: string
          description: Name of the tool that failed
        toolInput:
          type: string
          description: JSON-serialized input parameters that were passed to the tool
          nullable: true
        errorMessage:
          type: string
          description: Human-readable error message describing what went wrong
        messageId:
          type: string
          description: Unique identifier for this message section
        agentName:
          type: string
          description: Name of the agent emitting this event
          nullable: true
    StreamCompleteProgress:
      type: object
      description: Signal that the agent has completed streaming. The messageId references the last streamed message for frontend correlation.
      required:
        - type
        - messageId
      properties:
        type:
          type: string
          enum:
            - streamComplete
        messageId:
          type: string
          description: References the messageId of the last streamed message (ReasoningProgress or UtteranceProgress) so frontend can mark it as complete
        agentName:
          type: string
          description: Name of the agent that completed
          nullable: true
        success:
          type: boolean
          description: Whether the agent completed successfully
          default: true
    JobCompleteProgress:
      type: object
      description: Signal that the entire agent job has completed. This is the final event in the stream and indicates the SSE connection should be closed. Includes IDs of any artifacts created during the job for cache updates.
      required:
        - type
        - jobId
        - messageId
      properties:
        type:
          type: string
          enum:
            - jobComplete
        jobId:
          type: string
          description: The ID of the completed job
        messageId:
          type: string
          description: Unique identifier for this message section (for consistency with other progress events)
        success:
          type: boolean
          description: Whether the job completed successfully
          default: true
        createdRuleId:
          type: string
          format: uuid
          nullable: true
          description: ID of the rule created during this job (rule enhancement)
        createdManifestId:
          type: string
          format: uuid
          nullable: true
          description: ID of the manifest created during this job (manifest generation, orchestration)
        createdAppScriptId:
          type: string
          format: uuid
          nullable: true
          description: ID of the app script (CompiledResult) created during this job (app build, orchestration)
    JobCancelledProgress:
      type: object
      description: Signal that the agent job was cancelled by the user. This is a terminal event indicating the SSE connection should be closed.
      required:
        - type
        - jobId
        - messageId
      properties:
        type:
          type: string
          enum:
            - jobCancelled
        jobId:
          type: string
          description: The ID of the cancelled job
        messageId:
          type: string
          description: Unique identifier for this message section (for consistency with other progress events)
    AgentProgressEvent:
      oneOf:
        - $ref: "#/components/schemas/UserMessageEvent"
        - $ref: "#/components/schemas/ReasoningProgress"
        - $ref: "#/components/schemas/ToolCallProgress"
        - $ref: "#/components/schemas/UtteranceProgress"
        - $ref: "#/components/schemas/ErrorProgress"
        - $ref: "#/components/schemas/ToolExecutionErrorProgress"
        - $ref: "#/components/schemas/StreamCompleteProgress"
        - $ref: "#/components/schemas/JobCompleteProgress"
        - $ref: "#/components/schemas/JobCancelledProgress"
      discriminator:
        propertyName: type
        mapping:
          userMessage: "#/components/schemas/UserMessageEvent"
          reasoning: "#/components/schemas/ReasoningProgress"
          toolCall: "#/components/schemas/ToolCallProgress"
          utterance: "#/components/schemas/UtteranceProgress"
          error: "#/components/schemas/ErrorProgress"
          toolExecutionError: "#/components/schemas/ToolExecutionErrorProgress"
          streamComplete: "#/components/schemas/StreamCompleteProgress"
          jobComplete: "#/components/schemas/JobCompleteProgress"
          jobCancelled: "#/components/schemas/JobCancelledProgress"
    ConversationSummary:
      type: object
      description: Summary of a conversation for listing
      properties:
        conversationId:
          type: string
          format: uuid
          description: Unique identifier for the conversation
        gameId:
          type: string
          format: uuid
          nullable: true
          description: Associated game ID if any
        createdAt:
          type: string
          format: date-time
          description: When the conversation was created
        lastModifiedAt:
          type: string
          format: date-time
          description: When the conversation was last modified
      required:
        - conversationId
        - createdAt
        - lastModifiedAt
    ConversationsListResponse:
      type: object
      description: Response containing list of conversations
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/ConversationSummary"
      required:
        - conversations
    JobDetailResponse:
      type: object
      description: Detailed information for an agent job
      properties:
        jobId:
          type: string
          format: uuid
          description: Unique identifier for the job
        gameId:
          type: string
          format: uuid
          description: Unique identifier for the game
        conversationId:
          type: string
          format: uuid
          nullable: true
          description: The conversation this job belongs to, if any
        jobType:
          $ref: "#/components/schemas/AgentJobType"
        status:
          $ref: "#/components/schemas/AgentJobStatus"
        errorMessage:
          type: string
          nullable: true
          description: Error message if the job failed
        createdAt:
          type: string
          format: date-time
          description: When the job was created
        startedAt:
          type: string
          format: date-time
          nullable: true
          description: When the job started running
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: When the job completed
        createdRuleId:
          type: string
          format: uuid
          nullable: true
          description: Rule ID created by this job
        createdManifestId:
          type: string
          format: uuid
          nullable: true
          description: Manifest ID created by this job
        createdAppScriptId:
          type: string
          format: uuid
          nullable: true
          description: App script (compiled result) ID created by this job
      required:
        - jobId
        - gameId
        - jobType
        - status
        - createdAt
    SendSandboxMessageRequest:
      type: object
      description: Request to send a prompt/message to an OpenCode sandbox session
      required:
        - message
      properties:
        message:
          type: string
          description: The prompt or message to send to the sandbox
    SendSandboxMessageResponse:
      type: object
      description: Response after sending a message to the sandbox
      properties:
        messageId:
          type: string
          description: The message ID assigned by the OpenCode server
          nullable: true
    SandboxChatRequest:
      type: object
      description: |
        Request to send a chat message to the sandbox. If no sandbox session exists
        for this conversation, one is created automatically. If conversationId is not
        provided, a new conversation is created.
      required:
        - gameId
        - message
      properties:
        gameId:
          type: string
          format: uuid
          description: Game ID to work with
        conversationId:
          type: string
          format: uuid
          description: Optional conversation ID. If absent, a new conversation is created.
          nullable: true
        message:
          type: string
          description: The message to send to the sandbox
          example: Add a scoring system to the game
    SandboxChatResponse:
      type: object
      description: Response after sending a chat message to the sandbox
      required:
        - conversationId
        - jobId
      properties:
        conversationId:
          type: string
          format: uuid
          description: The conversation ID (newly created or existing)
        jobId:
          type: string
          format: uuid
          description: The agent job ID for tracking
    SandboxAbortRequest:
      type: object
      description: Request to abort a sandbox session
      required:
        - conversationId
      properties:
        conversationId:
          type: string
          format: uuid
          description: The conversation ID whose sandbox to abort
    SandboxWebhookEventType:
      type: string
      enum:
        - reasoning
        - utterance
        - tool_call
        - error
        - complete
      description: Type of sandbox webhook progress event
    SandboxWebhookProgressEvent:
      type: object
      description: The actual progress event data from the sandbox
      required:
        - type
      properties:
        type:
          type: string
        messageId:
          type: string
          nullable: true
        agentName:
          type: string
          nullable: true
        reasoning:
          type: string
          nullable: true
        utterance:
          type: string
          nullable: true
        toolName:
          type: string
          nullable: true
        toolArgs:
          type: object
          additionalProperties:
            type: string
          nullable: true
        message:
          type: string
          nullable: true
        details:
          type: string
          nullable: true
    SandboxWebhookEventPayload:
      type: object
      description: Webhook payload sent by Modal Bridge for each agent progress event
      required:
        - eventType
        - sandboxId
        - sessionId
        - timestamp
        - event
      properties:
        eventType:
          $ref: "#/components/schemas/SandboxWebhookEventType"
        sandboxId:
          type: string
          description: Sandbox that generated this event
        sessionId:
          type: string
          description: OpenCode session ID
        timestamp:
          type: string
          description: When the event occurred
        event:
          $ref: "#/components/schemas/SandboxWebhookProgressEvent"
    SandboxWebhookCreatedArtifacts:
      type: object
      description: IDs of artifacts created during the sandbox session
      properties:
        appScriptId:
          type: string
          format: uuid
          description: ID of the compiled app script
          nullable: true
    SandboxWebhookCompletePayload:
      type: object
      description: Payload sent when a Modal sandbox completes
      required:
        - sandboxId
        - sessionId
        - success
        - artifacts
      properties:
        sandboxId:
          type: string
        sessionId:
          type: string
        success:
          type: boolean
        artifacts:
          $ref: "#/components/schemas/SandboxWebhookCreatedArtifacts"
        error:
          type: string
          description: Error message if success is false
          nullable: true
    GameMessageType:
      type: string
      enum:
        - GAME_STARTED
        - YOUR_TURN
        - ACTION_EXECUTED
        - ACTION_REJECTED
        - TURN_CHANGED
        - GAME_ENDED
        - STATE_UPDATE
        - STATE_CHANGED
        - AVAILABLE_ACTIONS
        - ERROR
        - LOBBY_UPDATE
        - HISTORY_UPDATED
        - HISTORY_RESTORED
      description: Type of game message sent via Server-Sent Events
    LocationType:
      type: string
      enum:
        - InDeck
        - InHand
        - InZone
        - Detached
      description: Type of location where a component can be
    InDeckLocation:
      type: object
      required:
        - type
        - deckId
      properties:
        type:
          type: string
          enum:
            - InDeck
        deckId:
          type: string
          description: ID of the deck containing this component
        position:
          type: integer
          nullable: true
          description: Position within the deck (null means unordered)
    InHandLocation:
      type: object
      required:
        - type
        - playerId
      properties:
        type:
          type: string
          enum:
            - InHand
        playerId:
          type: string
          description: ID of the player holding this component
        position:
          type: integer
          nullable: true
          description: Position in hand (null means unordered)
    InZoneLocation:
      type: object
      required:
        - type
        - zoneId
      properties:
        type:
          type: string
          enum:
            - InZone
        zoneId:
          type: string
          description: ID of the zone containing this component
        position:
          type: integer
          nullable: true
          description: Position within the zone (null means unordered)
    DetachedLocation:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - Detached
      description: Component is not in any location (detached/removed from play)
    SimpleLocation:
      oneOf:
        - $ref: "#/components/schemas/InDeckLocation"
        - $ref: "#/components/schemas/InHandLocation"
        - $ref: "#/components/schemas/InZoneLocation"
        - $ref: "#/components/schemas/DetachedLocation"
      discriminator:
        propertyName: type
        mapping:
          InDeck: "#/components/schemas/InDeckLocation"
          InHand: "#/components/schemas/InHandLocation"
          InZone: "#/components/schemas/InZoneLocation"
          Detached: "#/components/schemas/DetachedLocation"
    CardSetSourceType:
      type: string
      enum:
        - preset
        - csv
        - manual
      description: Type of source for the card set
    TurnStepDefinition:
      type: object
      properties:
        name:
          type: string
          description: Turn step identifier
      required:
        - name
    ValidationResult:
      type: object
      properties:
        isValid:
          type: boolean
          description: Whether the validation passed
        errors:
          type: array
          items:
            type: string
          description: List of validation errors
        warnings:
          type: array
          items:
            type: string
          description: List of validation warnings
      required:
        - isValid
        - errors
        - warnings
    BuildAppRequest:
      type: object
      properties:
        gameId:
          type: string
          format: uuid
          description: Game ID to build app for
        manifestId:
          type: string
          format: uuid
          description: Specific manifest ID to build app with. If not provided, uses the latest manifest.
          nullable: true
        ruleId:
          type: string
          format: uuid
          description: Specific rule ID to build app with. If not provided, uses the latest rules associated with the manifest.
          nullable: true
        compiledResultId:
          type: string
          format: uuid
          description: Existing compiled result ID to build upon. If not provided, it will start from empty files.
          nullable: true
        instruction:
          type: string
          description: Optional instructions to guide the app build process
          nullable: true
      required:
        - gameId
    BuildAppResponse:
      type: object
      properties:
        jobId:
          type: string
          format: uuid
          description: Unique identifier for the app build job
      required:
        - jobId
    BuildUiRequest:
      type: object
      properties:
        gameId:
          type: string
          format: uuid
          description: Game ID to build UI for
        manifestId:
          type: string
          format: uuid
          description: Specific manifest ID to build UI with. If not provided, uses the latest manifest.
          nullable: true
        ruleId:
          type: string
          format: uuid
          description: Specific rule ID to build UI with. If not provided, uses the latest rules associated with the manifest.
          nullable: true
      required:
        - gameId
    BuildUiResponse:
      type: object
      properties:
        jobId:
          type: string
          format: uuid
          description: Unique identifier for the UI build job
      required:
        - jobId
    ModalSandboxJobRequest:
      type: object
      description: |
        Request to start a Modal sandbox-based OpenCode agent job.
        The agent runs in an isolated Modal sandbox with full development tools.
      required:
        - type
        - gameId
        - instruction
      properties:
        type:
          type: string
          enum:
            - MODAL_SANDBOX
        gameId:
          type: string
          format: uuid
          description: Game ID to work with
        instruction:
          type: string
          description: Instruction for the AI agent describing the task to perform.
          example: Add a win animation when a player wins the game
        ruleId:
          type: string
          format: uuid
          description: Specific rule ID to use. If not provided, uses the latest rules.
          nullable: true
        existingResultId:
          type: string
          format: uuid
          description: Existing unified result ID to build upon. If provided, loads source files from previous build and uses its manifestId.
          nullable: true
        modelId:
          type: string
          description: Optional model ID for OpenRouter (defaults to anthropic/claude-sonnet-4)
          nullable: true
        providerId:
          type: string
          description: Optional provider ID (defaults to openrouter)
          nullable: true
    GameManifestResponse:
      type: object
      properties:
        manifestId:
          type: string
          format: uuid
          description: Unique identifier for this manifest version
        gameId:
          type: string
          format: uuid
          description: Game identifier
        userId:
          type: string
          format: uuid
          description: User who created this version
        jobId:
          type: string
          format: uuid
          description: Agent job that created this manifest
          nullable: true
        manifest:
          $ref: "#/components/schemas/BoardManifest"
          description: The board manifest data
        version:
          type: integer
          description: Version number for this game
        createdAt:
          type: string
          format: date-time
          description: When this version was created
      required:
        - manifestId
        - gameId
        - userId
        - manifest
        - version
        - createdAt
    MessageEvent:
      $ref: "#/components/schemas/AgentProgressEvent"
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authentication
