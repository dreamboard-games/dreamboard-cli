        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/sessions/{sessionId}/status:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      summary: Get session status
      description: Get current status and phase of a game session
      operationId: getSessionStatus
      security:
        - BearerAuth: []
      tags:
        - Sessions
      responses:
        "200":
          description: Session status retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStatus"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/sessions/{sessionId}/events:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      summary: Subscribe to session events (SSE)
      description: Server-Sent Events stream for real-time session updates. Every connection starts with a `SESSION_BOOTSTRAP` snapshot that fully describes the durable session state, then emits only future live events generated after the connection is established.
      operationId: subscribeToSessionEvents
      security:
        - BearerAuth: []
      tags:
        - Sessions
      parameters:
        - name: clientId
          in: query
          required: true
          schema:
            type: string
          description: Stable browser-tab identifier used to replace stale reconnects from the same tab.
        - name: connectionAttemptId
          in: query
          required: true
          schema:
            type: string
          description: Unique identifier for this specific connection attempt.
        - name: clientSource
          in: query
          required: false
          schema:
            type: string
          description: Optional caller label for diagnostics, such as `play-page` or `session-play-panel`.
      responses:
        "200":
          description: SSE connection established
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/GameMessage"
                description: |
                  Server-Sent Events stream. Each event contains a JSON-serialized GameMessage.
                  Every connection begins with a `SESSION_BOOTSTRAP` event that fully describes the current durable session state.
                  After bootstrap, the stream includes only live updates and does not replay historical messages.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "429":
          $ref: "#/components/responses/TooManyRequestsError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/sessions/{sessionId}/events/disconnect:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      summary: Release a session events stream slot
      description: Best-effort disconnect signal used by browser tabs during unload and reconnect transitions so stale event stream slots are released promptly.
      operationId: disconnectSessionEvents
      security:
        - BearerAuth: []
      tags:
        - Sessions
      parameters:
        - name: clientId
          in: query
          required: true
          schema:
            type: string
          description: Stable browser-tab identifier originally used to open the session event stream.
        - name: connectionAttemptId
          in: query
          required: true
          schema:
            type: string
          description: Unique identifier for the specific connection attempt being released.
      responses:
        "202":
          description: Disconnect request accepted
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/sessions/{sessionId}/logs:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      summary: Subscribe to game logs (SSE)
      description: Server-Sent Events stream for real-time game engine console logs (stdout/stderr). Supports log replay via lastLogId query parameter for reconnection.
      operationId: subscribeToGameLogs
      security:
        - BearerAuth: []
      tags:
        - Sessions
      parameters:
        - name: lastLogId
          in: query
          description: Last log ID received (for reconnection/replay)
