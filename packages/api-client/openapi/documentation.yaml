          type: string
          description: Module or import specifier related to the diagnostic
          nullable: true
        affectedPaths:
          type: array
          description: Related project-relative paths involved in the diagnostic
          items:
            type: string
          nullable: true
        expectedSdkVersion:
          type: string
          description: Expected scaffold SDK version when validating static scaffold inputs
          nullable: true
        actualSdkVersion:
          type: string
          description: Actual scaffold SDK version detected in the source snapshot
          nullable: true
    ProjectCompilationDiagnostic:
      type: object
      description: Diagnostic that applies to the project as a whole rather than a specific source location
      properties:
        type:
          type: string
          enum:
            - project
        category:
          $ref: "#/components/schemas/ProjectCompilationDiagnosticCategory"
        message:
          type: string
          description: Human-readable diagnostic message
        severity:
          $ref: "#/components/schemas/CompilationDiagnosticSeverity"
        code:
          type: string
          description: Optional machine-readable diagnostic code for project-level failures
          nullable: true
        context:
          $ref: "#/components/schemas/ProjectCompilationDiagnosticContext"
          nullable: true
      required:
        - type
        - category
        - message
        - severity
    CompilationDiagnostic:
      oneOf:
        - $ref: "#/components/schemas/FileCompilationDiagnostic"
        - $ref: "#/components/schemas/ProjectCompilationDiagnostic"
      discriminator:
        propertyName: type
        mapping:
          file: "#/components/schemas/FileCompilationDiagnostic"
          project: "#/components/schemas/ProjectCompilationDiagnostic"
    CompiledResultStorageType:
      type: string
      description: Storage backend type for compiled game artifacts
      enum:
        - local
        - supabase
    CompiledResult:
      type: object
      description: Unified compiled result containing both APP and UI outputs from a single source
      properties:
        id:
          type: string
          format: uuid
          description: Compiled result identifier
        gameId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        authoringStateId:
          type: string
          format: uuid
          description: Authoring state used for this compilation
        manifestId:
          type: string
          format: uuid
          description: Manifest used for this compilation
        ruleId:
          type: string
          format: uuid
          description: Game rule used for this compilation
        compilationRequestId:
          type: string
          description: Client- or server-generated request correlation id
          nullable: true
        parentResultId:
          type: string
          format: uuid
          description: Parent compiled result ID in the lineage graph
          nullable: true
        lineageRootId:
          type: string
          format: uuid
          description: Root compiled result ID for this lineage
          nullable: true
        success:
          type: boolean
          description: Whether the compilation was successful
          default: true
        diagnostics:
          type: array
          description: Compilation diagnostics (only present when success=false)
          nullable: true
          items:
            $ref: "#/components/schemas/CompilationDiagnostic"
        appStorageType:
          $ref: "#/components/schemas/CompiledResultStorageType"
          description: Where compiled APP (game logic) artifacts are stored
        appStorageKey:
          type: string
          nullable: true
          description: Key/path for compiled APP artifacts. Null when APP compilation fails.
        uiStorageType:
          $ref: "#/components/schemas/CompiledResultStorageType"
          description: Where compiled UI (frontend) artifacts are stored
        uiStorageKey:
          type: string
          nullable: true
          description: Key/path for compiled UI artifacts. Null when UI compilation fails.
        appFingerprint:
          type: string
          nullable: true
          description: Deterministic fingerprint for the APP target inputs used by this compilation.
        uiFingerprint:
          type: string
          nullable: true
          description: Deterministic fingerprint for the UI target inputs used by this compilation.
        sourceRevisionId:
          type: string
          format: uuid
          description: Source revision used to produce this compilation
        sdkVersion:
          type: string
          description: Version of the UI SDK used for this compilation
          nullable: true
        createdAt:
          type: string
          format: date-time
        lastModifiedAt:
          type: string
          format: date-time
      required:
        - id
        - gameId
        - userId
        - authoringStateId
        - manifestId
        - ruleId
        - success
        - appStorageType
        - uiStorageType
        - sourceRevisionId
        - createdAt
        - lastModifiedAt
    ListCompiledResultsResponse:
      type: object
      description: Response containing a list of compiled results for a game
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/CompiledResult"
          description: List of compiled results, sorted by creation date (newest first)
      required:
        - results
    QueueCompiledResultJobRequest:
      type: object
      properties:
        authoringStateId:
          type: string
          format: uuid
          description: Authoring state to compile
      required:
        - authoringStateId
    QueueCompiledResultJobResponse:
      type: object
      description: Accepted compile request response. The compilation continues asynchronously and can be tracked via the returned job ID.
      properties:
        jobId:
          type: string
          format: uuid
          description: Agent job identifier for the queued compile
      required:
        - jobId
    GameSourcesResponse:
      type: object
      description: Response containing authored source files resolved through an authoring state.
      properties:
        authoringStateId:
          type: string
          format: uuid
          description: Current or requested authoring state identifier
        files:
          type: object
          additionalProperties:
            type: string
          description: Map of file path to file content (e.g., 'App.tsx' -> 'export ...')
        sourceRevisionId:
          type: string
          format: uuid
          description: Source revision identifier used to fetch the authored source files
        treeHash:
          type: string
          description: Deterministic hash of the authored source tree
        manifestId:
          type: string
          format: uuid
          nullable: true
          description: ID of the manifest associated with this authoring state
        manifestContentHash:
          type: string
          nullable: true
          description: SHA-256 hash of the canonical manifest content for this authoring state
        manifest:
          $ref: "#/components/schemas/GameTopologyManifest"
          nullable: true
          description: The board manifest data (null if no manifest is associated)
        ruleId:
          type: string
          format: uuid
          nullable: true
          description: ID of the game rule associated with this authoring state
        ruleText:
          type: string
          nullable: true
          description: The game rules text content (null if no rule is associated)
      required:
        - authoringStateId
        - sourceRevisionId
        - treeHash
        - files
    SourceChangeMode:
      type: string
      description: How the submitted change set should be applied against the base source revision.
      enum:
        - incremental
        - replace
    SourceFileUpsert:
      type: object
      description: Upsert a file in the authored source tree.
      properties:
        kind:
          type: string
          enum:
            - upsert
        path:
          type: string
          description: Relative file path within the authored source tree.
        contentHash:
          type: string
          description: SHA-256 hash of the UTF-8 file content stored in the blob store.
        byteSize:
          type: integer
          format: int32
          minimum: 0
          description: Size of the UTF-8 file content in bytes.
      required:
        - kind
        - path
        - contentHash
        - byteSize
    SourcePathDelete:
      type: object
      description: Delete a file from the authored source tree.
      properties:
        kind:
          type: string
          enum:
            - delete
        path:
          type: string
          description: Relative file path within the authored source tree.
      required:
        - kind
        - path
    SourceChangeOperation:
      oneOf:
        - $ref: "#/components/schemas/SourceFileUpsert"
        - $ref: "#/components/schemas/SourcePathDelete"
      discriminator:
        propertyName: kind
        mapping:
          upsert: "#/components/schemas/SourceFileUpsert"
          delete: "#/components/schemas/SourcePathDelete"
    CreateSourceRevisionRequest:
      type: object
      description: Request to create a new authored source revision from a change set.
      properties:
        baseSourceRevisionId:
          type: string
          format: uuid
          nullable: true
          description: Base source revision the change set must apply to. Must match the current head revision when present.
        mode:
          $ref: "#/components/schemas/SourceChangeMode"
        changes:
          type: array
          items:
            $ref: "#/components/schemas/SourceChangeOperation"
          description: Canonical change set applied to the authored source tree.
      required:
        - mode
        - changes
    SourceRevision:
      type: object
      description: Immutable authored source revision for a game.
      properties:
        id:
          type: string
          format: uuid
          description: Source revision identifier
        gameId:
          type: string
          format: uuid
          description: Game identifier
        userId:
          type: string
          format: uuid
          description: User who created the source revision
        parentSourceRevisionId:
          type: string
          format: uuid
          nullable: true
          description: Parent source revision identifier
        treeHash:
          type: string
          description: Deterministic hash of the authored source tree
        fileCount:
          type: integer
          format: int32
          description: Number of authored files stored in this revision
        createdAt:
          type: string
          format: date-time
          description: Revision creation timestamp
      required:
        - id
        - gameId
        - userId
        - treeHash
        - fileCount
        - createdAt
    SourceBlobUploadDescriptor:
      type: object
      description: Metadata describing a blob the client may need to upload before finalizing a source revision.
      properties:
        contentHash:
          type: string
          description: SHA-256 hash of the UTF-8 file content.
        byteSize:
          type: integer
          format: int32
          minimum: 0
          description: Size of the UTF-8 file content in bytes.
      required:
        - contentHash
        - byteSize
    CreateSourceBlobUploadSessionRequest:
      type: object
      description: Request upload targets for one or more source blobs.
      properties:
        blobs:
          type: array
          items:
            $ref: "#/components/schemas/SourceBlobUploadDescriptor"
          description: Unique blobs the client may need to upload.
      required:
        - blobs
    SourceBlobUploadTarget:
      type: object
      description: Provider-agnostic direct-upload target for a source blob.
      properties:
        method:
          type: string
          description: HTTP method the client must use when uploading the blob.
        url:
          type: string
          format: uri
          description: Fully qualified direct-upload URL.
        headers:
          type: object
          additionalProperties:
            type: string
          description: Required request headers for the direct upload.
      required:
        - method
        - url
        - headers
    SourceBlobUploadSessionEntry:
      type: object
      description: Upload instructions for a single source blob.
      properties:
        contentHash:
          type: string
          description: SHA-256 hash of the UTF-8 file content.
        status:
          type: string
          enum:
            - exists
            - upload_required
          description: Whether the blob already exists in storage or requires upload.
        uploadTarget:
          allOf:
            - $ref: "#/components/schemas/SourceBlobUploadTarget"
          nullable: true
          description: Present only when status is upload_required.
      required:
        - contentHash
        - status
    SourceBlobUploadSession:
      type: object
      description: Direct-upload session for source blobs needed by a source revision.
      properties:
        sessionId:
          type: string
          description: Opaque identifier for the upload session.
        expiresAt:
          type: string
          format: date-time
          description: Expiration time for any issued upload targets.
        uploads:
          type: array
          items:
            $ref: "#/components/schemas/SourceBlobUploadSessionEntry"
          description: Upload instructions for each requested blob.
      required:
        - sessionId
        - expiresAt
        - uploads
    AuthoringState:
      type: object
      description: Immutable authored workspace checkpoint tying together rule, manifest, and source revision.
      properties:
        authoringStateId:
          type: string
          format: uuid
          description: Authoring state identifier
        gameId:
          type: string
          format: uuid
          description: Game identifier
        userId:
          type: string
          format: uuid
          description: User who created this authoring state
        parentAuthoringStateId:
          type: string
          format: uuid
          nullable: true
          description: Parent authoring state identifier
        sourceRevisionId:
          type: string
          format: uuid
          description: Source revision identifier
        sourceTreeHash:
          type: string
          description: Deterministic hash of the authored source tree
        manifestId:
          type: string
          format: uuid
          description: Manifest identifier
        manifestContentHash:
          type: string
          description: SHA-256 hash of the canonical manifest content
        ruleId:
          type: string
          format: uuid
          description: Rule identifier
        createdAt:
          type: string
          format: date-time
          description: Authoring state creation timestamp
      required:
        - authoringStateId
        - gameId
        - userId
        - sourceRevisionId
        - sourceTreeHash
        - manifestId
        - manifestContentHash
        - ruleId
        - createdAt
    CreateAuthoringStateRequest:
      type: object
      description: Advance the current authoring head to a new immutable state.
      properties:
        baseAuthoringStateId:
          type: string
          format: uuid
          nullable: true
          description: Expected current authoring head before advancing. Required once a head exists.
        sourceRevisionId:
          type: string
          format: uuid
          description: Source revision for the next authored state
        sourceTreeHash:
          type: string
          description: Deterministic hash of the authored source tree for the next state
        manifestId:
          type: string
          format: uuid
          description: Manifest identifier for the next state
        manifestContentHash:
          type: string
          description: SHA-256 hash of the canonical manifest content for the next state
        ruleId:
          type: string
          format: uuid
          description: Rule identifier for the next state
      required:
        - sourceRevisionId
        - sourceTreeHash
        - manifestId
        - manifestContentHash
        - ruleId
