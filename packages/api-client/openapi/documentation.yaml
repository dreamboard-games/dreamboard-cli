      properties:
        type:
          type: string
          enum:
            - ACTION_REJECTED
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to
        reason:
          type: string
          description: Reason why the action was rejected
        errorCode:
          type: string
          nullable: true
