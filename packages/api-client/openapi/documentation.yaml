      properties:
        activeJob:
          $ref: "#/components/schemas/ActiveJobInfo"
          nullable: true
          description: The active job, or null if no job is currently running
        hasActiveJob:
          type: boolean
          description: True if there is an active job for this game
      required:
        - hasActiveJob
    ListGameRulesResponse:
      type: object
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/GameRuleSummaryDto"
          description: List of game rule versions, ordered by version descending (newest first)
