      responses:
        "204":
          description: Completion received successfully
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/ui-bundles/fetch:
    get:
      summary: Fetch UI bundle
      description: Fetch and return the HTML content of a UI bundle from Supabase storage based on the last compiled UI result
      operationId: fetchUiBundle
      security:
        - BearerAuth: []
      tags:
        - UI Bundles
      parameters:
        - name: gameId
          in: query
          description: ID of the game to fetch the UI bundle for
          schema:
            type: string
            format: uuid
          required: true
      responses:
        "200":
          description: UI bundle HTML retrieved successfully
          content:
            text/html:
              schema:
                type: string
                description: HTML content of the UI bundle
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  parameters:
    GameId:
      name: gameId
      in: path
      required: true
      description: Unique identifier for the game
      schema:
        type: string
        format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
    GameSlug:
      name: slug
      in: path
      required: true
      description: URL-safe game slug
      schema:
        type: string
        example: my-game
    SessionId:
      name: sessionId
      in: path
      required: true
      description: Unique identifier for the game session
      schema:
        type: string
        format: uuid
        example: 987e6543-e21b-34d5-b678-542316174000
    PlayerId:
      name: playerId
      in: path
      required: true
      description: Unique identifier for the player (e.g., 'player-1')
      schema:
        type: string
        example: player-1
  responses:
    UnauthorizedError:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    BadRequestError:
      description: Bad request - invalid input parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    ConflictError:
      description: Conflict - version mismatch or resource state conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    ForbiddenError:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    TooManyRequestsError:
      description: Too many requests or live connections
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
  schemas:
    ApiVersionResponse:
      type: object
      description: Backend runtime version metadata used by local development hosts.
      required:
        - backendRevision
        - uiSdkVersion
      properties:
        backendRevision:
          type: string
          nullable: true
          description: Deployed backend application revision or git SHA, when available.
        uiSdkVersion:
          type: string
          nullable: true
          description: UI SDK version expected by the backend runtime.
    GameMetadata:
      type: object
      properties:
        coverImage:
          type: string
          format: uri
          description: URL to the game's cover image
          nullable: true
        playTime:
          type: string
          description: Estimated play time
          enum:
            - 15-30 minutes
            - 30-60 minutes
            - 1-2 hours
            - 2-3 hours
            - 3+ hours
          nullable: true
        ageRange:
          type: string
          description: Recommended age range
          enum:
            - 3+
            - 6+
            - 8+
            - 10+
            - 12+
            - 14+
            - 16+
            - 18+
          nullable: true
        gameCategory:
          type: string
          description: Game category or genre
          enum:
            - Abstract
            - Strategy
            - Eurogame
            - Ameritrash
            - Card Game
            - Dice Game
            - Party Game
            - Cooperative
            - Competitive
            - Solo
            - Family Game
            - Wargame
            - Tile-Placement
            - Worker Placement
            - Deck Builder
          nullable: true
        keyMechanics:
          type: string
          description: Key game mechanics
          enum:
            - Area Control
            - Set Collection
            - Hand Management
            - Dice Rolling
            - Route Building
            - Pick-up and Deliver
            - Auction/Bidding
            - Hidden Roles
            - Bluffing
            - Push Your Luck
          nullable: true
    CompletedSteps:
      type: object
      description: Tracks which steps have been completed for a game
      properties:
        ruleSaved:
          type: boolean
          default: false
          description: Whether the rule has been saved (includes AI enhanced rules)
        manifestGenerated:
          type: boolean
          default: false
          description: Whether the manifest has been generated
        appBuilt:
          type: boolean
          default: false
          description: Whether the app has been built
        uiBuilt:
          type: boolean
          default: false
          description: Whether the UI has been built
    StepLightStatus:
      type: string
      description: Development status light shown in the dashboard
      enum:
        - yellow
        - green
        - red
    GameCompletionLights:
      type: object
      description: Per-area development lights shown for a game
      properties:
        rules:
          $ref: "#/components/schemas/StepLightStatus"
          description: Rule authoring status light
        manifest:
          $ref: "#/components/schemas/StepLightStatus"
          description: Manifest authoring status light
        phases:
          $ref: "#/components/schemas/StepLightStatus"
          description: Phase logic status light
        ui:
          $ref: "#/components/schemas/StepLightStatus"
          description: UI implementation status light
      required:
        - rules
        - manifest
        - phases
        - ui
    Game:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the game
        slug:
          type: string
          description: URL-safe game slug (lowercase kebab-case)
        name:
          type: string
          description: Display name of the game
          minLength: 1
          maxLength: 255
        description:
          type: string
          description: Detailed description of the game
          nullable: true
        ruleText:
          type: string
          description: Game rules text
          nullable: true
        public:
          type: boolean
          description: Whether the game is publicly visible
          default: false
        createdAt:
          type: string
          format: date-time
          description: When the game was created
        updatedAt:
          type: string
          format: date-time
          description: When the game was last updated
        scriptId:
          type: string
          description: ID of the script that defines the game logic
          nullable: true
        metadata:
          $ref: "#/components/schemas/GameMetadata"
          nullable: true
        completedSteps:
          $ref: "#/components/schemas/CompletedSteps"
          description: Tracks which steps have been completed for this game
        completionLights:
          $ref: "#/components/schemas/GameCompletionLights"
          description: Color lights representing progress since scaffold for rules, manifest, phases, and UI
        readyToPlay:
          type: boolean
          description: Whether the game is ready to play (all completion lights are green)
          default: false
        initialized:
          type: boolean
          description: "Whether the game has completed initial setup (all steps complete: rule saved, manifest generated, app built, UI built)"
          default: false
      required:
        - id
        - slug
        - name
        - public
        - createdAt
        - updatedAt
        - completedSteps
        - completionLights
        - readyToPlay
        - initialized
    ProblemType:
      type: string
      description: Stable machine-readable problem identifier
      enum:
        - urn:dreamboard:problem:action-rejected
        - urn:dreamboard:problem:active-job-conflict
        - urn:dreamboard:problem:authoring-state-base-missing
        - urn:dreamboard:problem:authoring-state-drift
        - urn:dreamboard:problem:forbidden
        - urn:dreamboard:problem:game-slug-conflict
        - urn:dreamboard:problem:internal-error
        - urn:dreamboard:problem:resource-not-found
        - urn:dreamboard:problem:source-revision-base-missing
        - urn:dreamboard:problem:source-revision-drift
        - urn:dreamboard:problem:source-revision-not-found
        - urn:dreamboard:problem:state-conflict
        - urn:dreamboard:problem:too-many-requests
        - urn:dreamboard:problem:unauthorized
        - urn:dreamboard:problem:validation-failed
      x-enum-varnames:
        - ACTION_REJECTED
        - ACTIVE_JOB_CONFLICT
        - AUTHORING_STATE_BASE_MISSING
        - AUTHORING_STATE_DRIFT
        - FORBIDDEN
        - GAME_SLUG_CONFLICT
        - INTERNAL_ERROR
        - RESOURCE_NOT_FOUND
        - SOURCE_REVISION_BASE_MISSING
        - SOURCE_REVISION_DRIFT
        - SOURCE_REVISION_NOT_FOUND
        - STATE_CONFLICT
        - TOO_MANY_REQUESTS
        - UNAUTHORIZED
        - VALIDATION_FAILED
    ProblemViolation:
      type: object
      properties:
        field:
          type: string
          description: Optional field or input path associated with the issue
        code:
          type: string
          description: Optional machine-readable issue code
        message:
          type: string
          description: Human-readable issue description
      required:
        - message
    ProblemDetails:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/ProblemType"
        title:
          type: string
          description: Short summary of the problem type
        status:
          type: integer
          description: HTTP status code for this problem
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence
        instance:
          type: string
          description: Request URI or other occurrence identifier
        requestId:
          type: string
          description: Correlation ID for tracing this request across logs and support tooling
        retryable:
          type: boolean
          description: Whether retrying the same request may succeed without changing input
        context:
          type: object
          additionalProperties:
            type: string
          description: Structured context for programmatic handling and richer UX
        violations:
          type: array
          items:
            $ref: "#/components/schemas/ProblemViolation"
          description: Optional structured issues associated with the problem
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the problem response
      required:
        - type
        - title
        - status
        - detail
    CreateGameRequest:
      type: object
      description: Request to create a new game
      properties:
        slug:
          type: string
          description: URL-safe game slug (lowercase kebab-case). Optional for legacy clients.
          nullable: true
        name:
          type: string
          description: "Name of the game (default: 'Untitled Game')"
          maxLength: 200
        description:
          type: string
          description: Optional description of the game
          maxLength: 1000
          nullable: true
        ruleText:
          type: string
          description: Optional initial rule text
          maxLength: 50000
        enhanceRule:
          type: boolean
          description: Whether to enhance the rules using AI before saving
          default: false
    PlayersDefinition:
      type: object
      description: Supported player-count metadata for the game
      properties:
        minPlayers:
          type: integer
          format: int32
          minimum: 1
          maximum: 10
        maxPlayers:
          type: integer
          format: int32
          minimum: 1
          maximum: 10
        optimalPlayers:
          type: integer
          format: int32
          minimum: 1
          maximum: 10
      required:
        - minPlayers
        - maxPlayers
    PresetCardSetDefinition:
      type: object
      properties:
        id:
          type: string
          description: Unique local identifier for the authored card set
          minLength: 1
        presetId:
          type: string
          description: Built-in preset card-set selector
          minLength: 1
        name:
          type: string
          description: Display name of the card set
          minLength: 1
        type:
          type: string
          enum:
            - preset
          description: Type of card set source
      required:
        - id
        - presetId
        - name
        - type
    PropertySchema:
      type: object
      properties:
        type:
          type: string
          enum:
            - string
            - integer
            - number
            - boolean
            - zoneId
            - cardId
            - playerId
            - boardId
            - edgeId
            - vertexId
            - spaceId
            - pieceId
            - dieId
            - resourceId
            - array
            - object
            - record
            - enum
          description: The data type of the property.
        description:
          type: string
          description: Optional description of the property's purpose and usage.
          nullable: true
        optional:
          type: boolean
          description: Whether an object property may be omitted.
          default: false
        nullable:
          type: boolean
          description: Whether the value may be null.
          default: false
        items:
          $ref: "#/components/schemas/PropertySchema"
          description: For array types, the schema of the array items. Required if type is 'array'.
          nullable: true
        properties:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PropertySchema"
          description: For object types, the schema of the object's properties. Required if type is 'object'.
          nullable: true
        enums:
          type: array
          items:
            type: string
          description: For enum types, the list of allowed string values. Required if type is 'enum'.
          nullable: true
        values:
          $ref: "#/components/schemas/PropertySchema"
          description: For record types, the schema of the record's values. Required if type is 'record'.
          nullable: true
      required:
        - type
    ObjectSchema:
      type: object
      properties:
        properties:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PropertySchema"
          description: Map of property names to their schemas. Type is always 'object' and all properties are required.
      required:
        - properties
    DetachedHomeSpec:
      type: object
      properties:
        type:
          type: string
          enum:
            - detached
      required:
        - type
    ZoneHomeSpec:
      type: object
      properties:
        type:
          type: string
          enum:
            - zone
        zoneId:
          type: string
      required:
        - type
        - zoneId
    SpaceHomeSpec:
      type: object
      properties:
        type:
          type: string
          enum:
            - space
        boardId:
          type: string
        spaceId:
          type: string
      required:
        - type
        - boardId
        - spaceId
    ContainerHomeSpec:
      type: object
      properties:
        type:
          type: string
          enum:
            - container
        boardId:
          type: string
        containerId:
          type: string
      required:
        - type
        - boardId
        - containerId
    BoardEdgeRef:
      type: object
      description: Tiled board edge identified by the spaces that border it
      properties:
        spaces:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 2
          uniqueItems: true
      required:
        - spaces
    EdgeHomeSpec:
      type: object
      properties:
        type:
          type: string
          enum:
            - edge
        boardId:
          type: string
        ref:
          $ref: "#/components/schemas/BoardEdgeRef"
      required:
        - type
        - boardId
        - ref
    BoardVertexRef:
      type: object
      description: Tiled board vertex identified by the spaces that touch it
      properties:
        spaces:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 4
          uniqueItems: true
      required:
        - spaces
    VertexHomeSpec:
      type: object
      properties:
        type:
          type: string
          enum:
            - vertex
        boardId:
          type: string
        ref:
          $ref: "#/components/schemas/BoardVertexRef"
      required:
        - type
        - boardId
        - ref
    PieceSlotHostRef:
      type: object
      properties:
        kind:
          type: string
          enum:
            - piece
        id:
          type: string
      required:
        - kind
        - id
    DieSlotHostRef:
      type: object
      properties:
        kind:
          type: string
          enum:
            - die
        id:
          type: string
      required:
        - kind
        - id
    SlotHostRef:
      oneOf:
        - $ref: "#/components/schemas/PieceSlotHostRef"
        - $ref: "#/components/schemas/DieSlotHostRef"
      discriminator:
        propertyName: kind
        mapping:
          piece: "#/components/schemas/PieceSlotHostRef"
          die: "#/components/schemas/DieSlotHostRef"
    SlotHomeSpec:
      type: object
      properties:
        type:
          type: string
          enum:
            - slot
        host:
          $ref: "#/components/schemas/SlotHostRef"
        slotId:
          type: string
      required:
        - type
        - host
        - slotId
    ComponentHomeSpec:
      oneOf:
        - $ref: "#/components/schemas/DetachedHomeSpec"
        - $ref: "#/components/schemas/ZoneHomeSpec"
        - $ref: "#/components/schemas/SpaceHomeSpec"
        - $ref: "#/components/schemas/ContainerHomeSpec"
        - $ref: "#/components/schemas/EdgeHomeSpec"
        - $ref: "#/components/schemas/VertexHomeSpec"
        - $ref: "#/components/schemas/SlotHomeSpec"
      discriminator:
        propertyName: type
        mapping:
          detached: "#/components/schemas/DetachedHomeSpec"
          zone: "#/components/schemas/ZoneHomeSpec"
          space: "#/components/schemas/SpaceHomeSpec"
          container: "#/components/schemas/ContainerHomeSpec"
          edge: "#/components/schemas/EdgeHomeSpec"
          vertex: "#/components/schemas/VertexHomeSpec"
          slot: "#/components/schemas/SlotHomeSpec"
    ComponentVisibilitySpec:
      type: object
      description: Default authored visibility for a component instance
      properties:
        faceUp:
          type: boolean
          default: true
        visibleTo:
          type: array
          items:
            type: string
          description: When omitted, visible to all players
          nullable: true
    JsonValue:
      description: Arbitrary authored JSON value.
      oneOf:
        - type: string
        - type: integer
        - type: number
        - type: boolean
        - type: "null"
        - type: array
          items:
            $ref: "#/components/schemas/JsonValue"
        - type: object
          additionalProperties:
            $ref: "#/components/schemas/JsonValue"
    BoardCard:
      type: object
      properties:
        type:
          type: string
          description: Card type identifier used to generate runtime CardIds. When count > 1, runtime IDs are generated as '{type}-1', '{type}-2', etc.
        name:
          type: string
          description: Display name of the card
        imageUrl:
          type: string
          description: URL to the card's image
          nullable: true
        text:
          type: string
          description: Text content on the card
          nullable: true
        count:
          type: integer
          format: int32
          description: Number of copies of this card
          minimum: 1
        cardType:
          type: string
          description: Optional authored card category or subtype identifier
          nullable: true
        home:
          $ref: "#/components/schemas/ComponentHomeSpec"
          description: Optional authored home for this card inventory. When omitted, cards start detached until reducer setup places them.
          nullable: true
        visibility:
          $ref: "#/components/schemas/ComponentVisibilitySpec"
          description: Default authored visibility for the card inventory
          nullable: true
        properties:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/JsonValue"
          description: Actual property values for this specific card instance. Keys must match the properties defined in the referenced cardSchema.
          x-kotlin-type: kotlinx.serialization.json.JsonElement
      required:
        - type
        - name
        - count
        - properties
    ManualCardSetDefinition:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the card set
          minLength: 1
        name:
          type: string
          description: Display name of the card set
          minLength: 1
        type:
          type: string
          enum:
            - manual
          description: Type of card set source
        cardSchema:
          $ref: "#/components/schemas/ObjectSchema"
          description: Schema definition for authored card properties in this card set
          nullable: true
        cards:
          type: array
          items:
            $ref: "#/components/schemas/BoardCard"
          description: List of authored cards in this card set
          minItems: 0
      required:
        - id
        - name
        - type
        - cards
        - cardSchema
    CardSetDefinition:
      oneOf:
        - $ref: "#/components/schemas/PresetCardSetDefinition"
        - $ref: "#/components/schemas/ManualCardSetDefinition"
      discriminator:
        propertyName: type
        mapping:
          preset: "#/components/schemas/PresetCardSetDefinition"
          manual: "#/components/schemas/ManualCardSetDefinition"
    TopologyScope:
      type: string
      enum:
        - shared
        - perPlayer
      description: Whether authored topology exists once for the table or once per player
    ZoneVisibility:
      type: string
      enum:
        - ownerOnly
        - public
        - hidden
      description: Default topology visibility for a zone or slot
    ZoneSpec:
      type: object
      description: Generic authored container that can hold cards, pieces, or dice
      properties:
        id:
          type: string
          description: Stable zone identifier
          pattern: ^[a-zA-Z][a-zA-Z0-9_-]*$
        name:
          type: string
          description: Display name for the zone
        scope:
          $ref: "#/components/schemas/TopologyScope"
        allowedCardSetIds:
          type: array
          items:
            type: string
          description: Optional card-set restriction for this zone
          nullable: true
        visibility:
          $ref: "#/components/schemas/ZoneVisibility"
          default: public
      required:
        - id
        - name
        - scope
    BoardSpaceSpec:
      type: object
      description: Stable authored board space or slot anchor
      properties:
        id:
          type: string
          description: Stable space identifier local to the board
        name:
          type: string
          description: Human-readable space name
          nullable: true
        typeId:
          type: string
          description: Optional authored space type identifier
          nullable: true
        fields:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/JsonValue"
          description: Typed authored fields validated against the board's spaceFieldsSchema
          x-kotlin-type: kotlinx.serialization.json.JsonElement
          nullable: true
      required:
        - id
    BoardRelationSpec:
      type: object
      description: Named relation between two authored spaces
      properties:
        id:
          type: string
          description: Optional stable relation identifier
          nullable: true
        typeId:
          type: string
          description: Relation type identifier such as adjacent, covers, blocks, or linked
        fromSpaceId:
          type: string
        toSpaceId:
          type: string
        directed:
          type: boolean
          default: false
        fields:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/JsonValue"
          description: Typed authored relation fields validated against relationFieldsSchema
          x-kotlin-type: kotlinx.serialization.json.JsonElement
          nullable: true
      required:
        - typeId
        - fromSpaceId
        - toSpaceId
    BoardHostSpec:
      type: object
      properties:
        type:
          type: string
          enum:
            - board
      required:
        - type
    SpaceHostSpec:
      type: object
      properties:
        type:
          type: string
          enum:
            - space
        spaceId:
          type: string
      required:
        - type
        - spaceId
    BoardContainerHostSpec:
      oneOf:
        - $ref: "#/components/schemas/BoardHostSpec"
        - $ref: "#/components/schemas/SpaceHostSpec"
      discriminator:
        propertyName: type
        mapping:
          board: "#/components/schemas/BoardHostSpec"
          space: "#/components/schemas/SpaceHostSpec"
    BoardContainerSpec:
      type: object
      description: Authored board-attached or space-attached container/slot
      properties:
        id:
          type: string
          description: Stable container identifier local to the board
        name:
          type: string
          description: Display name for the container
        host:
          $ref: "#/components/schemas/BoardContainerHostSpec"
        allowedCardSetIds:
          type: array
          items:
            type: string
          nullable: true
        fields:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/JsonValue"
          description: Typed authored container fields validated against containerFieldsSchema
          x-kotlin-type: kotlinx.serialization.json.JsonElement
          nullable: true
      required:
        - id
        - name
        - host
    GenericBoardTemplateSpec:
      type: object
      description: Reusable authored board topology template
      properties:
        id:
          type: string
          description: Stable template identifier
          pattern: ^[a-zA-Z][a-zA-Z0-9_-]*$
        name:
          type: string
        layout:
          type: string
          enum:
            - generic
        typeId:
          type: string
          description: Optional authored board type identifier such as track, map, tableau, or grid
          nullable: true
        boardFieldsSchema:
          $ref: "#/components/schemas/ObjectSchema"
          nullable: true
        spaceFieldsSchema:
          $ref: "#/components/schemas/ObjectSchema"
          nullable: true
        relationFieldsSchema:
          $ref: "#/components/schemas/ObjectSchema"
          nullable: true
        containerFieldsSchema:
          $ref: "#/components/schemas/ObjectSchema"
          nullable: true
        spaces:
          type: array
          items:
            $ref: "#/components/schemas/BoardSpaceSpec"
          default: []
        relations:
          type: array
          items:
            $ref: "#/components/schemas/BoardRelationSpec"
          default: []
        containers:
          type: array
          items:
            $ref: "#/components/schemas/BoardContainerSpec"
          default: []
      required:
        - id
        - name
        - layout
    HexOrientation:
      type: string
      enum:
        - pointy-top
        - flat-top
      description: Visual orientation for authored hex coordinates
    HexSpaceSpec:
      type: object
      description: One authored hex space in axial coordinates
      properties:
        id:
          type: string
          description: Stable space identifier local to the board
        q:
          type: integer
          format: int32
          description: Axial q coordinate
        r:
          type: integer
          format: int32
          description: Axial r coordinate
        typeId:
          type: string
          description: Optional authored space type identifier
          nullable: true
        label:
          type: string
          description: Optional hex-space label for setup or rendering
          nullable: true
        fields:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/JsonValue"
          description: Typed authored fields validated against the board's spaceFieldsSchema
          x-kotlin-type: kotlinx.serialization.json.JsonElement
          nullable: true
      required:
        - id
        - q
        - r
    HexEdgeRef:
      type: object
      description: Hex edge identified by two adjacent hex spaces
      properties:
        spaces:
          type: array
          items:
            type: string
