openapi: 3.1.0
info:
  title: Dreamboard API
  description: API for managing board games and game sessions in Dreamboard
  version: 1.0.0
  contact:
    name: Dreamboard Team
servers:
  - url: https://dreamboard.games
    description: Production server
  - url: http://localhost:8080
    description: Development server
security:
  - BearerAuth: []
tags:
  - name: Health
    description: Health check endpoints
  - name: Games
    description: Game management operations
  - name: Rulebooks
    description: Rulebook query operations
  - name: Sessions
    description: Game session and lobby management
  - name: UI Bundles
    description: UI bundle fetching and management
  - name: Agent
    description: AI agent operations for manifest generation
  - name: WebSocket
    description: Real-time communication
  - name: Webhooks
    description: Webhook endpoints called by external services
  - name: Sandbox
    description: OpenCode sandbox session messaging
  - name: Development
    description: Development and testing endpoints
paths:
  /:
    get:
      summary: Health check endpoint
      description: Returns a simple health check message
      operationId: healthCheck
      tags:
        - Health
      responses:
        "200":
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: Hello World!
  /api/version:
    get:
      summary: Get backend version metadata
      description: Returns backend revision metadata and the UI SDK version expected by the backend runtime.
      operationId: getApiVersion
      tags:
        - Health
      responses:
        "200":
          description: Successfully retrieved backend version metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiVersionResponse"
  /api/games:
    get:
      summary: List user's games
      description: Retrieve a list of all games owned by the authenticated user
      operationId: listGames
      tags:
        - Games
      parameters:
        - name: includeNotInitialized
          in: query
          description: Include games that haven't been fully initialized (missing rules, manifest, app, or UI). Defaults to false.
          schema:
            type: boolean
            default: false
          required: false
      responses:
        "200":
          description: Successfully retrieved games list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      summary: Create a new game
      description: Create a new game definition
      operationId: createGame
      tags:
        - Games
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGameRequest"
      responses:
        "201":
          description: Game created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}:
    parameters:
      - $ref: "#/components/parameters/GameId"
    get:
      summary: Get game by ID
      description: Retrieve a specific game definition by its ID
      operationId: getGame
      tags:
        - Games
      responses:
        "200":
          description: Successfully retrieved game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      summary: Update game
      description: Update an existing game definition
      operationId: updateGame
      tags:
        - Games
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGameRequest"
      responses:
        "200":
          description: Game updated successfully
          content:
            application/json:
              schema:
                type: string
                description: Success message
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      summary: Delete game
      description: Delete a game definition permanently
      operationId: deleteGame
      tags:
        - Games
      responses:
        "200":
          description: Game deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGameResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/slug/{slug}:
    parameters:
      - $ref: "#/components/parameters/GameSlug"
    get:
      summary: Get game by slug
      description: Retrieve a specific game definition by its slug
      operationId: getGameBySlug
      tags:
        - Games
      parameters:
        - name: includeDeleted
          in: query
          description: Include soft-deleted games in the lookup. Defaults to false.
          schema:
            type: boolean
            default: false
          required: false
      responses:
        "200":
          description: Successfully retrieved game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/workshop/query:
    get:
      summary: Query rulebook text by title
      description: Search ranked rulebook candidates for the provided title, try up to the top 3 matches, and return extracted text from the first valid PDF found.
      operationId: queryWorkshopRulebook
      security:
        - BearerAuth: []
      tags:
        - Rulebooks
      parameters:
        - name: title
          in: query
          description: Board game title to search for in the rulebook library.
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Extracted rulebook text for the first valid candidate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkshopRuleTextResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}/manifests:
    post:
      summary: Save game manifest
      description: Create a new versioned manifest for a game. Each save creates a new version with automatic version numbering.
      operationId: saveManifest
      security:
        - BearerAuth: []
      tags:
        - Games
      parameters:
        - $ref: "#/components/parameters/GameId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveManifestRequest"
      responses:
        "201":
          description: Manifest saved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveManifestResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      summary: Find manifests for game
      description: Retrieve a list of manifest versions for a game, ordered by version descending (newest first)
      operationId: findManifests
      security:
        - BearerAuth: []
      tags:
        - Games
      parameters:
        - $ref: "#/components/parameters/GameId"
        - name: limit
          in: query
          description: "Maximum number of manifests to return (default: 10, max: 100)"
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 10
          required: false
        - name: ruleId
          in: query
          description: Filter to only return manifests for a specific rule
          schema:
            type: string
            format: uuid
          required: true
      responses:
        "200":
          description: Manifests retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindManifestsResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/manifests/{manifestId}:
    parameters:
      - name: manifestId
        in: path
        required: true
        description: Unique identifier for the manifest
        schema:
          type: string
          format: uuid
    get:
      summary: Get manifest by ID
      description: Retrieve a specific manifest version by its ID with full board manifest details
      operationId: getManifest
      security:
        - BearerAuth: []
      tags:
        - Games
      responses:
        "200":
          description: Manifest retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameManifestDto"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}/compiled-results/latest:
    get:
      summary: Get latest compiled result for a game
      description: Return the most recent compiled result for the specified game.
      operationId: getLatestCompiledResult
      security:
        - BearerAuth: []
      tags:
        - Games
      parameters:
        - $ref: "#/components/parameters/GameId"
        - name: successOnly
          in: query
          description: If true, only return results where success=true and uiStorageKey is present
          schema:
            type: boolean
            default: false
          required: false
      responses:
        "200":
          description: Latest compiled result found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompiledResult"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}/compiled-results:
    get:
      summary: List compiled results for a game
      description: Retrieve a list of compiled results for a game, ordered by creation date descending (newest first). Includes both successful and failed compilations.
      operationId: listCompiledResults
      security:
        - BearerAuth: []
      tags:
        - Games
      parameters:
        - $ref: "#/components/parameters/GameId"
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return. Default is 10.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: authoringStateId
          in: query
          required: false
          description: Optional authoring state ID to limit results to a single authored head.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Compiled results retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCompiledResultsResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      summary: Queue a compile job for an authoring state
      description: Queue an asynchronous compile for a specific authoring state. Poll `/api/jobs/{jobId}` and fetch the final compiled result by ID when the job completes.
      operationId: queueCompiledResultJob
      security:
        - BearerAuth: []
      tags:
        - Games
      parameters:
        - $ref: "#/components/parameters/GameId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueCompiledResultJobRequest"
      responses:
        "202":
          description: Compile job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueCompiledResultJobResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}/compiled-results/{compiledResultId}:
    parameters:
      - $ref: "#/components/parameters/GameId"
      - name: compiledResultId
        in: path
        required: true
        description: Unique identifier for the compiled result
        schema:
          type: string
          format: uuid
    get:
      summary: Get compiled result by ID
      description: Fetch a specific compiled result for a game, including failed results and diagnostics.
      operationId: getCompiledResult
      security:
        - BearerAuth: []
      tags:
        - Games
      responses:
        "200":
          description: Compiled result found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompiledResult"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}/download:
    get:
      summary: Download authored game source files
      description: Download the authored source files for the current authoring head as a ZIP archive.
      operationId: downloadGameSources
      security:
        - BearerAuth: []
      tags:
        - Games
      parameters:
        - $ref: "#/components/parameters/GameId"
      responses:
        "200":
          description: ZIP archive containing source files
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}/sources:
    get:
      summary: Get authored game source files
      description: Retrieve authored source files as JSON for the selected authoring state. If no authoring state is provided, the current authoring head is used.
      operationId: getGameSources
      security:
        - BearerAuth: []
      tags:
        - Games
      parameters:
        - $ref: "#/components/parameters/GameId"
        - name: authoringStateId
          in: query
          required: false
          description: Optional authoring state ID to fetch sources from. If not provided, uses the current authoring head.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Source files retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameSourcesResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}/source-revisions:
    post:
      summary: Create a source revision for a game
      description: Create a new authored source revision from a hash-addressed change set. The request must be based on the current head revision for the game.
      operationId: createSourceRevision
      security:
        - BearerAuth: []
      tags:
        - Games
      parameters:
        - $ref: "#/components/parameters/GameId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSourceRevisionRequest"
      responses:
        "201":
          description: Source revision created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceRevision"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          description: Base source revision does not match the current head revision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}/source-blobs/upload-sessions:
    post:
      summary: Create direct-upload targets for source blobs
      description: Create a direct-upload session for one or more source blobs referenced by a forthcoming source revision.
      operationId: createSourceBlobUploadSession
      security:
        - BearerAuth: []
      tags:
        - Games
      parameters:
        - $ref: "#/components/parameters/GameId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSourceBlobUploadSessionRequest"
      responses:
        "201":
          description: Upload session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceBlobUploadSession"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}/authoring/head:
    get:
      summary: Get current authoring head for a game
      description: Retrieve the current remote authoring head for the specified game.
      operationId: getAuthoringHead
      security:
        - BearerAuth: []
      tags:
        - Games
      parameters:
        - $ref: "#/components/parameters/GameId"
      responses:
        "200":
          description: Current authoring head found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthoringState"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}/authoring/states:
    post:
      summary: Advance the authoring head for a game
      description: Create a new immutable authoring state and make it the current authoring head for the specified game.
      operationId: createAuthoringState
      security:
        - BearerAuth: []
      tags:
        - Games
      parameters:
        - $ref: "#/components/parameters/GameId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuthoringStateRequest"
      responses:
        "201":
          description: Authoring state created and promoted to head
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthoringState"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          description: Base authoring state does not match the current head
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}/scripts:
    get:
      summary: Get game scripts
      description: Retrieve all compiled app and UI scripts for a specific manifest
      operationId: getGameScripts
      security:
        - BearerAuth: []
      tags:
        - Games
      parameters:
        - $ref: "#/components/parameters/GameId"
        - name: manifestId
          in: query
          required: true
          description: The manifest ID to get compiled scripts for
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Game scripts retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameScriptsResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}/agent-chat-context:
    get:
      summary: Get agent chat context
      description: |
        Retrieve all initial data needed for the agent chat page in a single request.
        Returns rules, manifests for the latest rule, and scripts for the latest manifest,
        with pre-selected defaults to eliminate client-side auto-selection logic.
      operationId: getAgentChatContext
      security:
        - BearerAuth: []
      tags:
        - Agent Chat
      parameters:
        - $ref: "#/components/parameters/GameId"
      responses:
        "200":
          description: Agent chat context retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentChatContextResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}/jobs/active:
    parameters:
      - $ref: "#/components/parameters/GameId"
    get:
      summary: Get active job for a game
      description: Returns the currently active (PENDING or RUNNING) job for a game, if any. Jobs older than 15 minutes are considered stale and ignored.
      operationId: getActiveJob
      security:
        - BearerAuth: []
      tags:
        - Jobs
      responses:
        "200":
          description: Active job status (null if no active job)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveJobResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}/rules:
    post:
      summary: Create a new game rule
      description: Create a new versioned rule for a game. Each save creates a new version with automatic version numbering.
      operationId: createGameRule
      security:
        - BearerAuth: []
      tags:
        - Games
      parameters:
        - $ref: "#/components/parameters/GameId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGameRuleRequest"
      responses:
        "201":
          description: Game rule created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGameRuleResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      summary: List game rules for a game
      description: Retrieve a list of rule versions for a game, ordered by version descending (newest first)
      operationId: listGameRules
      security:
        - BearerAuth: []
      tags:
        - Games
      parameters:
        - $ref: "#/components/parameters/GameId"
        - name: limit
          in: query
          description: "Maximum number of rules to return (default: 10, max: 100)"
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 10
          required: false
      responses:
        "200":
          description: Game rules retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGameRulesResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}/rules/latest:
    get:
      summary: Get the latest game rule
      description: Retrieve the most recent rule version for a game with full details including the complete rule text
      operationId: getLatestGameRule
      security:
        - BearerAuth: []
      tags:
        - Games
      parameters:
        - $ref: "#/components/parameters/GameId"
      responses:
        "200":
          description: Latest game rule retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameRule"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/rules/{ruleId}:
    parameters:
      - name: ruleId
        in: path
        required: true
        description: Unique identifier for the game rule
        schema:
          type: string
          format: uuid
    get:
      summary: Get game rule by ID
      description: Retrieve a specific game rule version by its ID with full details
      operationId: getGameRule
      security:
        - BearerAuth: []
      tags:
        - Games
      responses:
        "200":
          description: Game rule retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameRule"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/games/{gameId}/sessions:
    post:
      summary: Create a new game session
      description: Create a new game session in lobby phase with initial seat configuration
      operationId: createSession
      security:
        - BearerAuth: []
      tags:
        - Sessions
      parameters:
        - $ref: "#/components/parameters/GameId"
      requestBody:
        required: true
