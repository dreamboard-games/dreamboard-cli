        - controllablePlayerIds
        - currentPhase
        - seatViewsByPlayerId
        - availableActions
        - prompts
        - windows
      properties:
        version:
          type: integer
          description: Monotonic gameplay version for stale-client detection
        activePlayers:
          type: array
          items:
            type: string
          description: Player IDs currently active in the game state
        controllablePlayerIds:
          type: array
          items:
            type: string
          description: Player IDs this user can control in the session
        currentPhase:
          type: string
          description: Current reducer-native gameplay phase
        seatViewsByPlayerId:
          type: object
          additionalProperties:
            type: string
          description: JSON-serialized reducer-projected UI views keyed by player ID
        availableActions:
          type: array
          items:
            $ref: "#/components/schemas/PlayerAvailableActions"
          description: Available action metadata grouped by controllable player
        prompts:
          type: array
          items:
            $ref: "#/components/schemas/GameplayPromptInstance"
        windows:
          type: array
          items:
            $ref: "#/components/schemas/GameplayWindowInstance"
    HistoryEntrySummary:
      type: object
      description: Summary of a game state history entry
      required:
        - id
        - version
        - timestamp
        - description
        - isCurrent
      properties:
        id:
          type: string
          description: Unique identifier for this history entry
        version:
          type: integer
          description: Event store version number
        timestamp:
          type: string
          format: date-time
          description: When this snapshot was created
        description:
          type: string
          description: Human-readable description of the action
        playerId:
          type: string
          nullable: true
          description: Player who performed the action
        actionType:
          type: string
          nullable: true
          description: Type of action that triggered this snapshot
        isCurrent:
          type: boolean
          description: Whether this is the current game state
    SessionSnapshotHistory:
      type: object
      required:
        - entries
        - currentIndex
        - canGoBack
        - canGoForward
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/HistoryEntrySummary"
          description: Durable game history entries available to the current user
        currentIndex:
          type: integer
          description: Index of the selected history entry
        canGoBack:
          type: boolean
          description: Whether an earlier history entry exists
        canGoForward:
          type: boolean
          description: Whether a later history entry exists
    SessionSnapshotMessage:
      type: object
      description: Durable session snapshot sent first on every session event stream connection
      required:
        - type
        - toUser
        - phase
        - lobby
      properties:
        type:
          type: string
          enum:
            - SESSION_BOOTSTRAP
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to
        phase:
          $ref: "#/components/schemas/SessionSnapshotPhase"
        lobby:
          $ref: "#/components/schemas/SessionSnapshotLobby"
        gameplay:
          $ref: "#/components/schemas/GameplaySnapshot"
          nullable: true
        history:
          $ref: "#/components/schemas/SessionSnapshotHistory"
          nullable: true
    GameplayUpdateMessage:
      type: object
