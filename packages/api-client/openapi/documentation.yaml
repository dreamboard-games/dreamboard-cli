        targetPlayer:
          type: string
          nullable: true
          description: Player ID whose action was rejected
    TurnChangedMessage:
      type: object
      required:
        - type
        - toUser
        - previousPlayers
        - currentPlayers
      properties:
        type:
          type: string
          enum:
            - TURN_CHANGED
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to
        previousPlayers:
          type: array
          items:
            type: string
          description: Player IDs of the previous active players
        currentPlayers:
          type: array
          items:
            type: string
          description: Player IDs of the current active players
    GameEndedMessage:
      type: object
      required:
        - type
        - toUser
        - finalScores
        - reason
      properties:
        type:
          type: string
          enum:
            - GAME_ENDED
        toUser:
          type: string
          format: uuid
          description: User ID this message is addressed to
        winner:
          type: string
          nullable: true
