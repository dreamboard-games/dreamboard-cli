    CompilationDiagnosticSeverity:
      type: string
      description: Diagnostic severity level
      enum:
        - error
        - warning
    FileCompilationDiagnostic:
      type: object
      description: Diagnostic tied to a specific project file and source location
      properties:
        type:
          type: string
          enum:
            - file
        file:
          type: string
          description: Project-relative file path where the diagnostic occurred
        line:
          type: integer
          minimum: 1
          description: Line number where the diagnostic occurred (1-based)
        column:
          type: integer
          minimum: 1
          description: Column number where the diagnostic occurred (1-based)
        message:
          type: string
          description: Human-readable diagnostic message
        severity:
          $ref: "#/components/schemas/CompilationDiagnosticSeverity"
        code:
          type: string
          description: Optional machine-readable diagnostic code (for example, a TypeScript diagnostic code)
          nullable: true
      required:
        - type
        - file
        - line
        - column
        - message
        - severity
    ProjectCompilationDiagnosticCategory:
      type: string
      description: Category of a project-level compilation diagnostic
      enum:
        - configuration
        - module_resolution
        - project
        - system
        - source_validation
    ProjectCompilationDiagnosticContext:
      type: object
      description: Additional structured context for a project-level diagnostic
      properties:
        file:
          type: string
          description: Related project-relative file path if one exists
          nullable: true
        details:
          type: string
          description: Additional human-readable context
          nullable: true
        moduleName:
          type: string
          description: Module or import specifier related to the diagnostic
          nullable: true
        affectedPaths:
          type: array
          description: Related project-relative paths involved in the diagnostic
          items:
            type: string
          nullable: true
        expectedSdkVersion:
          type: string
          description: Expected scaffold SDK version when validating static scaffold inputs
          nullable: true
        actualSdkVersion:
          type: string
          description: Actual scaffold SDK version detected in the source snapshot
          nullable: true
    ProjectCompilationDiagnostic:
      type: object
      description: Diagnostic that applies to the project as a whole rather than a specific source location
      properties:
        type:
          type: string
          enum:
            - project
        category:
          $ref: "#/components/schemas/ProjectCompilationDiagnosticCategory"
        message:
          type: string
          description: Human-readable diagnostic message
        severity:
          $ref: "#/components/schemas/CompilationDiagnosticSeverity"
        code:
          type: string
          description: Optional machine-readable diagnostic code for project-level failures
          nullable: true
        context:
          $ref: "#/components/schemas/ProjectCompilationDiagnosticContext"
          nullable: true
      required:
        - type
        - category
        - message
        - severity
    CompilationDiagnostic:
      oneOf:
        - $ref: "#/components/schemas/FileCompilationDiagnostic"
        - $ref: "#/components/schemas/ProjectCompilationDiagnostic"
      discriminator:
        propertyName: type
        mapping:
          file: "#/components/schemas/FileCompilationDiagnostic"
          project: "#/components/schemas/ProjectCompilationDiagnostic"
    CompiledResultStorageType:
      type: string
      description: Storage backend type for compiled game artifacts
      enum:
        - local
        - supabase
    CompiledResult:
      type: object
      description: Unified compiled result containing both APP and UI outputs from a single source
      properties:
        id:
          type: string
          format: uuid
          description: Compiled result identifier
        gameId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        manifestId:
          type: string
          format: uuid
          description: Manifest used for this compilation
        ruleId:
          type: string
          format: uuid
          description: Game rule used for this compilation
        compilationRequestId:
          type: string
          description: Client- or server-generated request correlation id
          nullable: true
        parentResultId:
          type: string
          format: uuid
          description: Parent compiled result ID in the lineage graph
          nullable: true
        lineageRootId:
          type: string
          format: uuid
          description: Root compiled result ID for this lineage
          nullable: true
        success:
          type: boolean
          description: Whether the compilation was successful
          default: true
        diagnostics:
          type: array
          description: Compilation diagnostics (only present when success=false)
          nullable: true
          items:
            $ref: "#/components/schemas/CompilationDiagnostic"
        appStorageType:
          $ref: "#/components/schemas/CompiledResultStorageType"
          description: Where compiled APP (game logic) artifacts are stored
        appStorageKey:
          type: string
          nullable: true
          description: Key/path for compiled APP artifacts. Null when APP compilation fails.
        uiStorageType:
          $ref: "#/components/schemas/CompiledResultStorageType"
          description: Where compiled UI (frontend) artifacts are stored
        uiStorageKey:
          type: string
          nullable: true
          description: Key/path for compiled UI artifacts. Null when UI compilation fails.
        sourceRevisionId:
          type: string
          format: uuid
          description: Source revision used to produce this compilation
        sdkVersion:
          type: string
          description: Version of the UI SDK used for this compilation
          nullable: true
        createdAt:
          type: string
          format: date-time
        lastModifiedAt:
          type: string
          format: date-time
      required:
        - id
        - gameId
        - userId
        - manifestId
        - ruleId
        - success
        - appStorageType
        - uiStorageType
        - sourceRevisionId
        - createdAt
        - lastModifiedAt
    ListCompiledResultsResponse:
      type: object
      description: Response containing a list of compiled results for a game
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/CompiledResult"
          description: List of compiled results, sorted by creation date (newest first)
      required:
        - results
    CreateCompiledResultRequest:
      type: object
      properties:
        sourceRevisionId:
          type: string
          format: uuid
          description: Source revision to compile
        manifestId:
          type: string
          format: uuid
          description: Manifest used for this compilation
        ruleId:
          type: string
          format: uuid
          description: Game rule used for this compilation
      required:
        - sourceRevisionId
        - manifestId
        - ruleId
    GameSourcesResponse:
      type: object
      description: Response containing authored source files resolved through a compiled result's source revision.
      properties:
        files:
          type: object
          additionalProperties:
            type: string
          description: Map of file path to file content (e.g., 'App.tsx' -> 'export ...')
        sourceRevisionId:
          type: string
          format: uuid
          description: Source revision identifier used to fetch the authored source files
        treeHash:
          type: string
          description: Deterministic hash of the authored source tree
        resultId:
          type: string
          format: uuid
          description: ID of the compiled result used to fetch source files
          nullable: true
        manifestId:
          type: string
          format: uuid
          nullable: true
          description: ID of the manifest associated with this compiled result
        manifest:
          $ref: "#/components/schemas/BoardManifest"
          nullable: true
          description: The board manifest data (null if no manifest is associated)
        ruleId:
          type: string
          format: uuid
          nullable: true
          description: ID of the game rule associated with this compiled result
        ruleText:
          type: string
          nullable: true
          description: The game rules text content (null if no rule is associated)
      required:
        - sourceRevisionId
        - treeHash
        - files
    DynamicScaffoldRequest:
      type: object
      description: Request options for dynamic scaffold generation.
      required:
        - manifestId
        - mode
      properties:
        manifestId:
          type: string
          format: uuid
          description: Manifest ID to scaffold from
        ruleId:
          type: string
          format: uuid
          nullable: true
          description: Optional rule ID for generators that use rule context.
        mode:
          type: string
          description: Generation profile.
          enum:
            - new
            - update
        seedMissingOnly:
          type: boolean
          description: Advisory metadata for clients indicating seed write policy preference.
          default: true
        templateVersion:
          type: string
          nullable: true
          description: Optional template version pinning request.
    DynamicScaffoldMetadata:
      type: object
      description: Metadata describing the dynamic scaffold generation run.
      required:
        - generatedAt
        - templateVersion
        - phaseNames
      properties:
        generatedAt:
          type: string
          format: date-time
          description: ISO timestamp when files were generated.
        templateVersion:
          type: string
          description: Template version used for generation.
        phaseNames:
          type: array
          description: List of phase names in the manifest at generation time.
          items:
            type: string
        deprecations:
          type: array
          nullable: true
          description: Optional deprecation notices for generated output.
          items:
            type: string
    DynamicScaffoldResponse:
      type: object
      description: Response containing generated files and seed files with explicit ownership split.
      required:
        - generatedFiles
        - seedFiles
        - metadata
      properties:
        generatedFiles:
          type: object
          additionalProperties:
            type: string
          description: Dynamic generated files that should always be replaced by clients.
        seedFiles:
          type: object
          additionalProperties:
            type: string
          description: Dynamic seed files that should only be written when missing/empty unless forced.
        metadata:
          $ref: "#/components/schemas/DynamicScaffoldMetadata"
    SourceChangeMode:
      type: string
      description: How the submitted change set should be applied against the base source revision.
      enum:
        - incremental
        - replace
    SourceFileUpsert:
      type: object
      description: Upsert a file in the authored source tree.
      properties:
        kind:
          type: string
          enum:
            - upsert
        path:
          type: string
          description: Relative file path within the authored source tree.
        content:
          type: string
          description: UTF-8 file content for the authored source file.
      required:
        - kind
        - path
        - content
    SourcePathDelete:
      type: object
      description: Delete a file from the authored source tree.
      properties:
        kind:
          type: string
          enum:
            - delete
        path:
          type: string
          description: Relative file path within the authored source tree.
      required:
        - kind
        - path
    SourceChangeOperation:
      oneOf:
        - $ref: "#/components/schemas/SourceFileUpsert"
        - $ref: "#/components/schemas/SourcePathDelete"
      discriminator:
        propertyName: kind
        mapping:
          upsert: "#/components/schemas/SourceFileUpsert"
          delete: "#/components/schemas/SourcePathDelete"
    CreateSourceRevisionRequest:
      type: object
      description: Request to create a new authored source revision from a change set.
      properties:
        baseSourceRevisionId:
          type: string
          format: uuid
          nullable: true
          description: Base source revision the change set must apply to. Must match the current head revision when present.
        mode:
          $ref: "#/components/schemas/SourceChangeMode"
        changes:
          type: array
          items:
            $ref: "#/components/schemas/SourceChangeOperation"
          description: Canonical change set applied to the authored source tree.
      required:
        - mode
        - changes
    SourceRevision:
      type: object
      description: Immutable authored source revision for a game.
      properties:
        id:
          type: string
          format: uuid
          description: Source revision identifier
        gameId:
          type: string
          format: uuid
          description: Game identifier
        userId:
          type: string
          format: uuid
          description: User who created the source revision
        parentSourceRevisionId:
          type: string
          format: uuid
          nullable: true
          description: Parent source revision identifier
        treeHash:
          type: string
          description: Deterministic hash of the authored source tree
        fileCount:
          type: integer
          format: int32
          description: Number of authored files stored in this revision
        createdAt:
          type: string
          format: date-time
          description: Revision creation timestamp
      required:
        - id
        - gameId
        - userId
        - treeHash
        - fileCount
        - createdAt
    GameScriptsResponse:
      type: object
      properties:
        appScripts:
          type: array
          items:
            $ref: "#/components/schemas/CompiledResult"
          description: List of compiled app (game logic) scripts
        uiScripts:
          type: array
          items:
            $ref: "#/components/schemas/CompiledResult"
          description: List of compiled UI scripts
      required:
        - appScripts
        - uiScripts
    GameRuleSummaryDto:
      type: object
      properties:
        ruleId:
          type: string
          format: uuid
          description: Unique identifier for this rule version
        gameId:
          type: string
          format: uuid
          description: Game identifier
        userId:
          type: string
          format: uuid
          description: User who created this version
        version:
          type: integer
          description: Version number for this game's rules
        createdAt:
          type: string
          format: date-time
          description: When this version was created
        preview:
          type: string
          description: Preview snippet of the rule text (first 200 characters)
          nullable: true
      required:
        - ruleId
        - gameId
        - userId
        - version
        - createdAt
    AgentChatScriptsContext:
      type: object
      description: Scripts context with pre-selected defaults for agent chat
      properties:
        appScripts:
          type: array
          items:
            $ref: "#/components/schemas/CompiledResult"
          description: List of compiled app (game logic) scripts
        currentAppScriptId:
          type: string
          format: uuid
          nullable: true
          description: Pre-selected app script ID
      required:
        - appScripts
    AgentChatContextResponse:
      type: object
      description: Combined response containing all initial data for the agent chat page
      properties:
        rules:
          type: array
          description: All game rules sorted by version descending
          items:
            $ref: "#/components/schemas/GameRuleSummaryDto"
        currentRuleId:
          type: string
          format: uuid
          nullable: true
          description: Pre-selected rule ID (latest version)
        manifests:
          type: array
          description: Manifests for the current rule
          items:
            $ref: "#/components/schemas/GameManifestSummaryDto"
        currentManifestId:
          type: string
          format: uuid
          nullable: true
          description: Pre-selected manifest ID
        scripts:
          $ref: "#/components/schemas/AgentChatScriptsContext"
          nullable: true
          description: Scripts for the current manifest
      required:
        - rules
        - manifests
    AgentJobType:
      type: string
      description: Type of agent job
      enum:
        - APP_BUILD
        - UI_BUILD
        - MODAL_SANDBOX
    AgentJobStatus:
      type: string
      description: Status of an agent job
      enum:
        - PENDING
        - RUNNING
        - COMPLETED
        - FAILED
        - CANCELLED
        - INTERRUPTED
    ActiveJobInfo:
