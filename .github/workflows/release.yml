name: Release CLI

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git tag to create. Must match v<packageVersion>."
        required: true
        type: string
      npm_tag:
        description: "npm dist-tag to publish under"
        required: true
        default: beta
        type: choice
        options:
          - beta
          - latest

concurrency:
  group: release-cli
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    env:
      NODE_VERSION: "24"
      DEFAULT_BRANCH: "main"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stage publish package
        run: pnpm pack:publish

      - name: Validate release metadata
        id: release_meta
        run: |
          if [ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]; then
            echo "Releases must run from ${DEFAULT_BRANCH}, got ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

          package_version="$(node -p "require('./apps/dreamboard-cli/.publish/package/package.json').version")"
          expected_tag="v${package_version}"
          release_tag="${{ inputs.release_tag }}"
          npm_tag="${{ inputs.npm_tag }}"

          if [ "${release_tag}" != "${expected_tag}" ]; then
            echo "Release tag ${release_tag} does not match expected tag ${expected_tag}." >&2
            exit 1
          fi

          if gh release view "${release_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "GitHub release ${release_tag} already exists." >&2
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$npm_tag" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to npm
        run: |
          npm publish apps/dreamboard-cli/.publish/package \
            --tag "${{ steps.release_meta.outputs.npm_tag }}"

      - name: Create GitHub Release
        run: |
          release_args=(
            "${{ steps.release_meta.outputs.release_tag }}"
            --repo "${GITHUB_REPOSITORY}"
            --target "${GITHUB_SHA}"
            --title "${{ steps.release_meta.outputs.release_tag }}"
            --generate-notes
          )

          if [ "${{ steps.release_meta.outputs.npm_tag }}" = "beta" ]; then
            release_args+=(--prerelease)
          fi

          gh release create "${release_args[@]}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Job summary
        run: |
          {
            echo "Published \`dreamboard@${{ steps.release_meta.outputs.package_version }}\`"
            echo
            echo "- release tag: \`${{ steps.release_meta.outputs.release_tag }}\`"
            echo "- npm tag: \`${{ steps.release_meta.outputs.npm_tag }}\`"
            echo "- branch: \`${GITHUB_REF_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"
